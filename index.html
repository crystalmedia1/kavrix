<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavrix AI | Next-Gen App Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans overflow-hidden">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-[400px] bg-[#1e293b] border-r border-slate-700 flex flex-col shadow-2xl z-10">
            <div class="p-6 border-b border-slate-700">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">KAVRIX AI</h1>
                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-[0.2em] font-semibold">Professional App Engine</p>
            </div>
            
            <div class="flex-1 p-6 overflow-y-auto space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Project Beschrijving</label>
                    <textarea id="promptInput" 
                        class="w-full h-64 bg-[#0f172a] border border-slate-600 rounded-2xl p-4 text-white focus:ring-2 focus:ring-cyan-500 outline-none transition-all resize-none placeholder-slate-500 text-sm leading-relaxed"
                        placeholder="Beschrijf je app in detail... Bijv: Bouw een IPTV player met een modern dashboard, zenderlijst aan de linkerkant en een video player in het midden. Gebruik een donker thema met neon accenten."></textarea>
                </div>
                
                <button id="buildBtn" class="w-full bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-indigo-500/20 transition-all flex items-center justify-center gap-3 group">
                    <i class="fas fa-bolt group-hover:scale-125 transition-transform"></i> 
                    <span>GENEREER APPLICATIE</span>
                </button>

                <div id="statusArea" class="hidden space-y-3 p-4 bg-[#0f172a] rounded-xl border border-slate-700">
                    <div class="flex items-center gap-3 text-sm text-cyan-400">
                        <i class="fas fa-circle-notch fa-spin"></i>
                        <span id="statusText">AI Engine is aan het opstarten...</span>
                    </div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-cyan-500 h-full w-0 transition-all duration-500"></div>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-slate-700 bg-[#1e293b] space-y-3">
                <button id="downloadBtn" class="w-full py-3 bg-slate-800 border border-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-700 transition flex items-center justify-center gap-2 hidden">
                    <i class="fas fa-download"></i> Download Broncode (.html)
                </button>
                <p class="text-[10px] text-center text-slate-500">Powered by Kavrix AI Engine v2.0</p>
            </div>
        </div>

        <!-- Main Preview Area -->
        <div class="flex-1 flex flex-col bg-[#0f172a]">
            <!-- Browser Header -->
            <div class="h-14 bg-[#1e293b] border-b border-slate-700 flex items-center px-6 justify-between">
                <div class="flex items-center gap-6">
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
                        <div class="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>
                        <div class="w-3 h-3 rounded-full bg-[#27c93f]"></div>
                    </div>
                    <div class="bg-[#0f172a] px-4 py-1.5 rounded-lg border border-slate-700 flex items-center gap-3 min-w-[400px]">
                        <i class="fas fa-lock text-[10px] text-green-500"></i>
                        <span class="text-xs font-mono text-slate-400 truncate">https://preview.kavrix.ai/session-active</span>
                    </div>
                </div>
                <div class="flex items-center gap-4 text-slate-400">
                    <button class="hover:text-white transition"><i class="fas fa-mobile-alt"></i></button>
                    <button class="hover:text-white transition"><i class="fas fa-tablet-alt"></i></button>
                    <button class="hover:text-white transition text-cyan-400"><i class="fas fa-desktop"></i></button>
                </div>
            </div>
            
            <!-- Iframe Container -->
            <div class="flex-1 relative p-4">
                <div class="w-full h-full rounded-xl overflow-hidden shadow-2xl border border-slate-700 bg-white">
                    <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
                </div>
                
                <!-- Empty State Overlay -->
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 bg-[#0f172a]/80 backdrop-blur-sm">
                    <div class="w-20 h-20 bg-slate-800 rounded-3xl flex items-center justify-center mb-6 border border-slate-700 shadow-xl">
                        <i class="fas fa-code text-3xl text-indigo-400"></i>
                    </div>
                    <h2 class="text-xl font-bold text-white mb-2">Klaar om te bouwen?</h2>
                    <p class="text-sm text-slate-400 max-w-xs text-center">Beschrijf je applicatie aan de linkerkant en zie de magie hier verschijnen.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastGeneratedCode = "";

        document.getElementById("buildBtn").addEventListener("click", async () => {
            const prompt = document.getElementById("promptInput").value.trim();
            if (!prompt) return;

            const btn = document.getElementById("buildBtn");
            const statusArea = document.getElementById("statusArea");
            const statusText = document.getElementById("statusText");
            const progressBar = document.getElementById("progressBar");
            const emptyState = document.getElementById("emptyState");
            const downloadBtn = document.getElementById("downloadBtn");

            btn.disabled = true;
            statusArea.classList.remove("hidden");
            emptyState.classList.add("hidden");
            
            // Progress simulatie
            progressBar.style.width = "30%";
            statusText.innerText = "AI Engine analyseert prompt...";

            try {
                const response = await fetch("https://kavrix.onrender.com/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });

                progressBar.style.width = "70%";
                statusText.innerText = "Code wordt gegenereerd...";

                const data = await response.json();
                
                if (data.code) {
                    lastGeneratedCode = data.code;
                    document.getElementById("previewFrame").srcdoc = data.code;
                    downloadBtn.classList.remove("hidden");
                    progressBar.style.width = "100%";
                    statusText.innerText = "Applicatie succesvol gebouwd!";
                    setTimeout(() => statusArea.classList.add("hidden"), 3000);
                }
            } catch (error) {
                statusText.innerText = "Verbindingsfout met server...";
                statusText.classList.add("text-red-400");
            } finally {
                btn.disabled = false;
            }
        });

        document.getElementById("downloadBtn").addEventListener("click", () => {
            const blob = new Blob([lastGeneratedCode], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'kavrix-app.html';
            a.click();
        });
    </script>
</body>
</html>
