<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kavrix AI | Volledige App Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
  />
  <style>
    #sidebar {
      transition: all 0.3s ease;
      z-index: 100;
    }
    .sidebar-closed {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
    }
    .glass-menu {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
    }
    iframe {
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      background: white;
    }
  </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans overflow-hidden">
  <!-- Top Bar -->
  <div
    class="h-16 border-b border-slate-800 flex items-center justify-between px-4 bg-[#0f172a] z-50 relative"
  >
    <div class="flex items-center gap-2">
      <button
        id="menuToggle"
        class="w-10 h-10 flex items-center justify-center bg-indigo-600 rounded-lg"
        aria-label="Menu toggle"
      >
        <i class="fas fa-bars text-white"></i>
      </button>
      <h1 class="text-lg font-black tracking-tighter">
        KAVRIX <span class="text-cyan-400">AI</span>
      </h1>
    </div>
    <div class="flex items-center gap-4">
      <button
        id="downloadBtn"
        class="hidden md:inline-block bg-cyan-600 hover:bg-cyan-700 px-4 py-2 rounded-lg font-semibold text-sm"
        aria-label="Download gegenereerde app"
      >
        <i class="fas fa-download mr-2"></i> Download app
      </button>
      <button
        id="resetBtn"
        class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-400"
        aria-label="Reset project"
      >
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </div>

  <div class="flex h-[calc(100vh-64px)] relative">
    <!-- Sidebar Overlay -->
    <aside
      id="sidebar"
      class="absolute inset-0 glass-menu p-6 space-y-6 sidebar-closed md:relative md:translate-x-0 md:opacity-100 md:pointer-events-auto md:w-[380px]"
      aria-label="Sidebar"
    >
      <section class="space-y-4">
        <label
          for="promptInput"
          class="text-[10px] font-bold text-slate-500 uppercase tracking-widest"
          >Nieuw Project</label
        >
        <textarea
          id="promptInput"
          class="w-full h-24 bg-[#020617] border border-slate-700 rounded-xl p-4 text-sm outline-none resize-none"
          placeholder="Beschrijf je app..."
          aria-multiline="true"
        ></textarea>
        <button
          id="buildBtn"
          class="w-full bg-indigo-600 py-3 rounded-xl font-bold text-sm hover:bg-indigo-700 transition"
        >
          BOUW APP
        </button>
      </section>

      <section id="editSection" class="space-y-4 opacity-40 pointer-events-none">
        <label
          for="editInput"
          class="text-[10px] font-bold text-purple-400 uppercase tracking-widest"
          >Aanpassen & Chat</label
        >
        <textarea
          id="editInput"
          class="w-full h-24 bg-[#020617] border border-slate-700 rounded-xl p-4 text-sm outline-none resize-none"
          placeholder="Wat moet er anders?"
          aria-multiline="true"
        ></textarea>
        <button
          id="editBtn"
          class="w-full bg-purple-600 py-3 rounded-xl font-bold text-sm hover:bg-purple-700 transition"
        >
          PAS AAN
        </button>
      </section>

      <section
        id="statusArea"
        class="hidden text-center p-4 bg-slate-900 rounded-xl border border-slate-800"
        aria-live="polite"
      >
        <i
          class="fas fa-sync-alt fa-spin text-cyan-400 mr-2"
          aria-hidden="true"
        ></i>
        <span
          id="statusText"
          class="text-xs text-cyan-400 font-bold uppercase tracking-widest"
          >Architect werkt...</span
        >
      </section>
    </aside>

    <!-- Preview Area -->
    <main class="flex-1 bg-[#020617] p-2 md:p-8">
      <iframe
        id="previewFrame"
        class="w-full h-full border-none"
        title="Preview van de gegenereerde app"
      ></iframe>
    </main>
  </div>

  <script>
    (() => {
      const sidebar = document.getElementById("sidebar");
      const menuToggle = document.getElementById("menuToggle");
      const resetBtn = document.getElementById("resetBtn");
      const buildBtn = document.getElementById("buildBtn");
      const editBtn = document.getElementById("editBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const promptInput = document.getElementById("promptInput");
      const editInput = document.getElementById("editInput");
      const previewFrame = document.getElementById("previewFrame");
      const statusArea = document.getElementById("statusArea");
      const statusText = document.getElementById("statusText");
      const editSection = document.getElementById("editSection");

      let currentCode = localStorage.getItem("kavrix_last_code") || "";

      // Toggle sidebar on mobile
      menuToggle.addEventListener("click", () => {
        sidebar.classList.toggle("sidebar-closed");
      });

      // Reset project
      resetBtn.addEventListener("click", () => {
        if (confirm("Project wissen?")) {
          localStorage.removeItem("kavrix_last_code");
          currentCode = "";
          previewFrame.srcdoc = "";
          promptInput.value = "";
          editInput.value = "";
          editSection.classList.add("opacity-40", "pointer-events-none");
          downloadBtn.classList.add("hidden");
        }
      });

      // Show current code if exists
      if (currentCode) {
        previewFrame.srcdoc = currentCode;
        editSection.classList.remove("opacity-40", "pointer-events-none");
        downloadBtn.classList.remove("hidden");
      }

      // Show status
      function showStatus(text) {
        statusText.textContent = text;
        statusArea.classList.remove("hidden");
      }

      // Hide status
      function hideStatus() {
        statusArea.classList.add("hidden");
      }

      // Call AI generate or edit
      async function callAI(prompt, isEdit = false) {
        const btn = isEdit ? editBtn : buildBtn;
        btn.disabled = true;
        showStatus("Architect werkt...");

        try {
          const response = await fetch("https://kavrix.onrender.com/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt,
              existingCode: isEdit ? currentCode : "",
            }),
          });

          const data = await response.json();

          if (data.code) {
            currentCode = data.code;
            localStorage.setItem("kavrix_last_code", currentCode);
            previewFrame.srcdoc = currentCode;
            editSection.classList.remove("opacity-40", "pointer-events-none");
            downloadBtn.classList.remove("hidden");
            sidebar.classList.add("sidebar-closed");
          } else if (data.error) {
            alert("Fout van AI: " + data.error);
          }
        } catch (e) {
          alert("Er is een fout opgetreden: " + e.message);
        } finally {
          btn.disabled = false;
          hideStatus();
        }
      }

      // Build new app
      buildBtn.addEventListener("click", () => {
        const prompt = promptInput.value.trim();
        if (prompt) callAI(prompt, false);
      });

      // Edit existing app
      editBtn.addEventListener("click", () => {
        const prompt = editInput.value.trim();
        if (prompt) callAI(prompt, true);
      });

      // Download current app as HTML file
      downloadBtn.addEventListener("click", () => {
        if (!currentCode) return alert("Geen app om te downloaden.");
        const blob = new Blob([currentCode], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "kavrix_app.html";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });
    })();
  </script>
</body>
</html>
