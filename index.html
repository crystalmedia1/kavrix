<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX ENTERPRISE | Mobile App Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; margin: 0; padding: 0; overflow: hidden; }
        
        /* Sidebar Styling */
        #sidebar { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 100;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
        }
        .sidebar-closed { transform: translateX(-100%); opacity: 0; pointer-events: none; }

        /* Preview Area - Vult het hele scherm */
        #main-viewport {
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: white;
        }

        /* Overlay voor lege status */
        #emptyState {
            position: absolute;
            inset: 0;
            background: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Loading Bar */
        .loader-bar { height: 4px; width: 100%; background: #1e293b; position: fixed; top: 0; left: 0; z-index: 110; overflow: hidden; display: none; }
        .loader-progress { height: 100%; background: #6366f1; width: 40%; position: absolute; animation: loading 1.5s infinite ease-in-out; }
        @keyframes loading { 0% { left: -40%; } 100% { left: 100%; } }
    </style>
</head>
<body>

    <!-- Loading Bar bovenaan -->
    <div id="loader" class="loader-bar"><div class="loader-progress"></div></div>

    <!-- Zwevende Menu Knop -->
    <button id="menuToggle" class="fixed top-4 left-4 w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center z-[110] shadow-2xl shadow-indigo-600/40 active:scale-90 transition-transform">
        <i class="fas fa-bars text-white text-xl"></i>
    </button>

    <!-- Sidebar (Menu dat over het scherm schuift) -->
    <aside id="sidebar" class="fixed inset-0 w-full md:w-[400px] h-full border-r border-slate-800 p-6 flex flex-col sidebar-closed">
        <div class="flex justify-between items-center mb-8 mt-12 md:mt-0">
            <h1 class="text-2xl font-black tracking-tighter text-white">KAVRIX <span class="text-indigo-500">PRO</span></h1>
            <button id="closeMenu" class="text-slate-400 text-2xl"><i class="fas fa-times"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto space-y-8">
            <!-- Build Section -->
            <div class="space-y-4">
                <label class="text-[11px] font-black text-indigo-400 uppercase tracking-widest">Nieuwe Opdracht</label>
                <textarea id="promptInput" class="w-full h-32 bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm outline-none focus:border-indigo-500 transition-all" placeholder="Wat gaan we bouwen?"></textarea>
                <button id="buildBtn" class="w-full bg-indigo-600 py-4 rounded-2xl font-black text-sm shadow-xl shadow-indigo-600/20">GENEREER APP</button>
            </div>

            <!-- Edit Section -->
            <div id="editSection" class="space-y-4 opacity-30 pointer-events-none">
                <label class="text-[11px] font-black text-emerald-400 uppercase tracking-widest">Aanpassen</label>
                <textarea id="editInput" class="w-full h-24 bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm outline-none focus:border-emerald-500 transition-all" placeholder="Wat moet er anders?"></textarea>
                <button id="editBtn" class="w-full bg-emerald-600 py-3 rounded-2xl font-black text-sm">UPDATE DOORVOEREN</button>
            </div>

            <!-- Extra Functies -->
            <div class="pt-6 border-t border-slate-800 space-y-3">
                <button onclick="alert('APK Builder start...')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-800/50 text-sm font-bold text-slate-400">
                    <i class="fab fa-android text-emerald-500"></i> Android APK
                </button>
                <button id="downloadBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-800/50 text-sm font-bold text-slate-400">
                    <i class="fas fa-download text-cyan-400"></i> Export HTML
                </button>
                <button id="resetBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-500/5 text-sm font-bold text-red-500/50">
                    <i class="fas fa-trash-alt"></i> Reset Project
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Viewport (De App zelf) -->
    <main id="main-viewport">
        <iframe id="previewFrame"></iframe>
        
        <!-- Lege status -->
        <div id="emptyState">
            <div class="w-20 h-20 bg-indigo-600/10 rounded-3xl flex items-center justify-center mb-6 border border-indigo-500/20">
                <i class="fas fa-rocket text-3xl text-indigo-500"></i>
            </div>
            <p class="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px]">Open het menu om te starten</p>
        </div>
    </main>

    <script>
        let currentCode = localStorage.getItem('kavrix_mobile_code') || "";
        const sidebar = document.getElementById("sidebar");
        const preview = document.getElementById("previewFrame");
        const empty = document.getElementById("emptyState");
        const loader = document.getElementById("loader");

        // Menu Logica
        document.getElementById("menuToggle").onclick = () => sidebar.classList.remove("sidebar-closed");
        document.getElementById("closeMenu").onclick = () => sidebar.classList.add("sidebar-closed");

        if(currentCode) {
            preview.srcdoc = currentCode;
            empty.classList.add("hidden");
            document.getElementById("editSection").classList.remove("opacity-30", "pointer-events-none");
        }

        async function callAI(prompt, isEdit = false) {
            const btn = isEdit ? document.getElementById("editBtn") : document.getElementById("buildBtn");
            btn.disabled = true;
            loader.style.display = "block";
            sidebar.classList.add("sidebar-closed");

            try {
                const response = await fetch("https://kavrix.onrender.com/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt, existingCode: isEdit ? currentCode : "" })
                });

                const data = await response.json();
                if (data.code) {
                    currentCode = data.code;
                    localStorage.setItem('kavrix_mobile_code', currentCode);
                    preview.srcdoc = data.code;
                    empty.classList.add("hidden");
                    document.getElementById("editSection").classList.remove("opacity-30", "pointer-events-none");
                }
            } catch (e) { alert("Fout bij genereren."); }
            finally { btn.disabled = false; loader.style.display = "none"; }
        }

        document.getElementById("buildBtn").onclick = () => {
            const p = document.getElementById("promptInput").value;
            if(p) callAI(p, false);
        };

        document.getElementById("editBtn").onclick = () => {
            const p = document.getElementById("editInput").value;
            if(p) callAI(p, true);
        };

        document.getElementById("resetBtn").onclick = () => {
            if(confirm("Alles wissen?")) {
                localStorage.removeItem('kavrix_mobile_code');
                location.reload();
            }
        };

        document.getElementById("downloadBtn").onclick = () => {
            const blob = new Blob([currentCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mijn-kavrix-app.html';
            a.click();
        };
    </script>
</body>
</html>
