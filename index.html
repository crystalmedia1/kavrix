<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX | DeepAgent Pro IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .loader-line { height: 3px; width: 0%; background: linear-gradient(to right, #6366f1, #a855f7); transition: 0.5s; position: fixed; top: 0; left: 0; z-index: 1000; }
        #sidebar, #codePanel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        .sidebar-closed { transform: translateX(-100%); }
        .code-closed { transform: translateX(100%); }
        .command-center { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 700px; z-index: 40; }
        pre { font-family: 'Fira Code', monospace; font-size: 11px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="loaderLine" class="loader-line"></div>

    <!-- Top Bar -->
    <div class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-6 z-[60] pointer-events-none">
        <button onclick="toggleSidebar()" class="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-xl pointer-events-auto">
            <i class="fas fa-th-large text-white text-sm"></i>
        </button>
        <div class="flex gap-2 pointer-events-auto">
            <button onclick="toggleCode()" class="glass px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest border border-white/10">
                <i class="fas fa-code mr-2"></i> Code
            </button>
            <button onclick="copyCode()" class="bg-white text-black px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-lg">
                <i class="fas fa-copy mr-2"></i> Copy
            </button>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:relative w-80 h-full glass border-r border-white/5 flex flex-col p-6 sidebar-closed md:sidebar-open shrink-0">
        <div class="flex items-center gap-4 mb-10 mt-16">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter leading-none">KAVRIX</h1>
                <span class="text-[9px] text-indigo-400 font-bold uppercase tracking-widest">DeepAgent Pro</span>
            </div>
        </div>
        <button onclick="newProject()" class="w-full bg-white/5 border border-white/10 text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest mb-8 hover:bg-white/10 transition-all">
            + Nieuw Project
        </button>
        <div class="flex-1 overflow-y-auto space-y-2 pr-2" id="projectList"></div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden h-full">
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-[#020617] p-8">
            <h2 class="text-2xl font-black mb-8 tracking-tight text-center">Start je creatie</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full max-w-md">
                <button onclick="useTemplate('Bouw een Retro Space Shooter game')" class="glass p-4 rounded-2xl text-left hover:bg-indigo-600/20 transition-all">
                    <i class="fas fa-gamepad text-orange-500 mb-2"></i>
                    <div class="text-[10px] font-bold uppercase">Space Game</div>
                </button>
                <button onclick="useTemplate('Bouw een Crypto Dashboard met live Bitcoin prijs')" class="glass p-4 rounded-2xl text-left hover:bg-emerald-600/20 transition-all">
                    <i class="fas fa-chart-line text-emerald-500 mb-2"></i>
                    <div class="text-[10px] font-bold uppercase">Crypto Live</div>
                </button>
            </div>
        </div>

        <div class="flex-1 relative z-0 h-full w-full">
            <iframe id="preview" class="hidden w-full h-full"></iframe>
        </div>

        <!-- Code Panel (Right) -->
        <div id="codePanel" class="fixed right-0 top-0 w-full md:w-[500px] h-full glass border-l border-white/10 p-6 code-closed overflow-y-auto mt-16 md:mt-0">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400">Source Code</h3>
                <button onclick="toggleCode()" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <pre id="codeDisplay" class="text-slate-300 whitespace-pre-wrap break-all"></pre>
        </div>

        <!-- Command Center -->
        <div class="command-center">
            <div class="glass rounded-[24px] p-1.5 flex items-center shadow-2xl border border-white/10">
                <input id="prompt" type="text" class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-sm font-medium text-white" placeholder="Wat wil je aanpassen?">
                <button id="go" class="bg-indigo-600 w-12 h-12 rounded-[18px] flex items-center justify-center hover:bg-indigo-500 transition-all active:scale-95 shrink-0">
                    <i class="fas fa-paper-plane text-white text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const RENDER_URL = "https://kavrix.onrender.com";
        let currentId = localStorage.getItem('kavrix_id');
        let currentCode = "";
        let pollInterval = null;

        function toggleSidebar() { document.getElementById("sidebar").classList.toggle("sidebar-closed"); }
        function toggleCode() { document.getElementById("codePanel").classList.toggle("code-closed"); }
        function useTemplate(t) { document.getElementById("prompt").value = t; run(); }
        
        function copyCode() {
            navigator.clipboard.writeText(currentCode);
            alert("Code gekopieerd!");
        }

        async function loadProjects() {
            try {
                const r = await fetch(`${RENDER_URL}/projects`);
                const data = await r.json();
                const list = document.getElementById("projectList");
                list.innerHTML = "";
                data.forEach(p => {
                    const div = document.createElement("div");
                    div.className = `p-3 flex justify-between items-center rounded-xl border border-transparent transition-all cursor-pointer ${currentId === p.id ? 'bg-indigo-600/20 border-indigo-500/30 text-indigo-400' : 'hover:bg-white/5 text-slate-500'}`;
                    div.innerHTML = `<span class="flex-1 text-[9px] font-bold truncate uppercase tracking-wider">${p.name || 'Project'}</span>`;
                    div.onclick = () => { selectProject(p.id); if(window.innerWidth < 768) toggleSidebar(); };
                    list.appendChild(div);
                });
            } catch(e) {}
        }

        async function selectProject(id) {
            currentId = id;
            localStorage.setItem('kavrix_id', id);
            document.getElementById("loaderLine").style.width = "30%";
            try {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                if (d.code === "GENERATING") {
                    startPolling(id);
                } else {
                    stopPolling();
                    currentCode = d.code;
                    const iframe = document.getElementById("preview");
                    iframe.srcdoc = d.code;
                    iframe.classList.remove("hidden");
                    document.getElementById("codeDisplay").innerText = d.code;
                    document.getElementById("emptyState").classList.add("hidden");
                    loadProjects();
                }
            } catch(e) {}
        }

        function startPolling(id) {
            document.getElementById("loaderLine").style.width = "60%";
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                if (d.code !== "GENERATING") selectProject(id);
            }, 3000);
        }

        function stopPolling() {
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById("loaderLine").style.width = "100%";
            setTimeout(() => document.getElementById("loaderLine").style.width = "0%", 600);
        }

        async function run() {
            const p = document.getElementById("prompt").value;
            if (!p) return;
            document.getElementById("loaderLine").style.width = "20%";
            try {
                const r = await fetch(`${RENDER_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: p, projectId: currentId })
                });
                const d = await r.json();
                startPolling(d.projectId);
                document.getElementById("prompt").value = "";
            } catch(e) { alert("Fout"); }
        }

        function newProject() {
            currentId = null;
            localStorage.removeItem('kavrix_id');
            location.reload();
        }

        document.getElementById("go").onclick = run;
        document.getElementById("prompt").onkeydown = (e) => { if(e.key === 'Enter') run(); };
        if(currentId) selectProject(currentId);
        loadProjects();
    </script>
</body>
</html>
