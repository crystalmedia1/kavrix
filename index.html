<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavrix AI | Professional App Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); }
        @keyframes pulse-cyan { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-cyan { animation: pulse-cyan 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans overflow-hidden">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-[420px] bg-[#0f172a] border-r border-slate-800 flex flex-col shadow-2xl z-20">
            <div class="p-8 border-b border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <i class="fas fa-microchip text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-white">KAVRIX <span class="text-cyan-400">AI</span></h1>
                        <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] font-bold">Architect v4.0</p>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 p-6 overflow-y-auto space-y-8">
                <!-- Nieuwe App Sectie -->
                <div class="space-y-4">
                    <label class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                        <i class="fas fa-plus-circle text-cyan-500"></i> Nieuw Project
                    </label>
                    <textarea id="promptInput" 
                        class="w-full h-40 bg-[#020617] border border-slate-700 rounded-2xl p-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-none placeholder-slate-600 text-sm"
                        placeholder="Beschrijf je nieuwe app..."></textarea>
                    <button id="buildBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold text-white shadow-xl transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-rocket"></i> BOUW APPLICATIE
                    </button>
                </div>

                <!-- Aanpas Sectie (Alleen zichtbaar na eerste build) -->
                <div id="editSection" class="space-y-4 opacity-40 pointer-events-none transition-all duration-500">
                    <label class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
                        <i class="fas fa-magic text-purple-500"></i> Verfijn of Repareer
                    </label>
                    <textarea id="editInput" 
                        class="w-full h-32 bg-[#020617] border border-slate-700 rounded-2xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all resize-none placeholder-slate-600 text-sm"
                        placeholder="Bijv: 'De zenderlijst laadt niet, gebruik een andere proxy' of 'Maak de achtergrond rood'"></textarea>
                    <button id="editBtn" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-2xl font-bold text-white shadow-xl transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-wand-magic-sparkles"></i> VOER WIJZIGING UIT
                    </button>
                </div>

                <div id="statusArea" class="hidden p-4 bg-slate-900/50 rounded-2xl border border-slate-800 border-dashed">
                    <div class="flex items-center gap-3 text-sm text-cyan-400 animate-pulse-cyan">
                        <i class="fas fa-sync-alt fa-spin"></i>
                        <span id="statusText">Architect is aan het ontwerpen...</span>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-slate-800 bg-[#0f172a]">
                <button id="downloadBtn" class="w-full py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold text-slate-300 transition flex items-center justify-center gap-2 hidden">
                    <i class="fas fa-file-code"></i> DOWNLOAD BRONCODE
                </button>
            </div>
        </div>

        <!-- Main Preview Area -->
        <div class="flex-1 flex flex-col bg-[#020617]">
            <div class="h-14 bg-[#0f172a] border-b border-slate-800 flex items-center px-8 justify-between">
                <div class="flex items-center gap-4">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-slate-700"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-700"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-700"></div>
                    </div>
                    <div class="h-8 bg-[#020617] px-4 rounded-full border border-slate-800 flex items-center gap-3 min-w-[300px]">
                        <i class="fas fa-shield-halved text-[10px] text-cyan-500"></i>
                        <span class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Secure Sandbox Environment</span>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 relative p-6">
                <div class="w-full h-full rounded-3xl overflow-hidden shadow-[0_0_50px_-12px_rgba(0,0,0,0.5)] border border-slate-800 bg-white">
                    <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
                </div>
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 bg-[#020617]">
                    <i class="fas fa-layer-group text-6xl mb-6 opacity-10"></i>
                    <p class="text-sm font-medium tracking-widest uppercase opacity-40">Wachtend op instructies...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCode = "";

        async function callAI(prompt, isEdit = false) {
            const btn = isEdit ? document.getElementById("editBtn") : document.getElementById("buildBtn");
            const statusArea = document.getElementById("statusArea");
            const statusText = document.getElementById("statusText");
            const emptyState = document.getElementById("emptyState");
            const editSection = document.getElementById("editSection");

            btn.disabled = true;
            statusArea.classList.remove("hidden");
            statusText.innerText = isEdit ? "App aan het aanpassen..." : "Nieuwe app aan het bouwen...";
            if(!isEdit) emptyState.classList.add("hidden");

            try {
                const response = await fetch("https://kavrix.onrender.com/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        prompt: prompt,
                        existingCode: isEdit ? currentCode : "" 
                    })
                });

                const data = await response.json();
                if (data.code) {
                    currentCode = data.code;
                    document.getElementById("previewFrame").srcdoc = data.code;
                    document.getElementById("downloadBtn").classList.remove("hidden");
                    editSection.classList.remove("opacity-40", "pointer-events-none");
                    statusText.innerText = "Klaar!";
                    setTimeout(() => statusArea.classList.add("hidden"), 2000);
                }
            } catch (error) {
                statusText.innerText = "Fout bij genereren...";
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById("buildBtn").addEventListener("click", () => {
            const prompt = document.getElementById("promptInput").value.trim();
            if (prompt) callAI(prompt, false);
        });

        document.getElementById("editBtn").addEventListener("click", () => {
            const editPrompt = document.getElementById("editInput").value.trim();
            if (editPrompt) callAI(editPrompt, true);
        });

        document.getElementById("downloadBtn").addEventListener("click", () => {
            const blob = new Blob([currentCode], { type: 'text/html' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'kavrix-project.html';
            a.click();
        });
    </script>
</body>
</html>
