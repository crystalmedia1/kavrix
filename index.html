<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX | DeepAgent Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #sidebar { transition: 0.4s; z-index: 200; background: #0f172a; }
        .sidebar-closed { transform: translateX(-100%); }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .loader { height: 4px; width: 100%; background: #1e293b; position: fixed; top: 0; z-index: 300; display: none; }
        .progress { height: 100%; background: #6366f1; width: 40%; position: absolute; animation: load 1.5s infinite linear; }
        @keyframes load { 0% { left: -40%; } 100% { left: 100%; } }
    </style>
</head>
<body>
    <div id="loader" class="loader"><div class="progress"></div></div>
    
    <button id="menuBtn" class="fixed top-4 left-4 w-12 h-12 bg-indigo-600 rounded-2xl z-[250] shadow-lg"><i class="fas fa-bars"></i></button>

    <aside id="sidebar" class="fixed inset-0 w-full md:w-96 h-full p-6 flex flex-col sidebar-closed">
        <div class="flex justify-between items-center mb-8 mt-10">
            <h1 class="text-2xl font-bold">KAVRIX <span class="text-indigo-500">AI</span></h1>
            <button id="closeBtn" class="text-2xl">&times;</button>
        </div>

        <div class="flex-1 overflow-y-auto space-y-6">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Opdracht</label>
                <textarea id="prompt" class="w-full h-32 bg-slate-900 border border-slate-700 rounded-xl p-4 mt-2 outline-none focus:border-indigo-500" placeholder="Wat wil je bouwen?"></textarea>
                <button id="go" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mt-4 shadow-lg shadow-indigo-600/20">GENEREER</button>
            </div>

            <div id="editBox" class="hidden">
                <label class="text-xs font-bold text-emerald-500 uppercase">Aanpassen</label>
                <textarea id="edit" class="w-full h-24 bg-slate-900 border border-slate-700 rounded-xl p-4 mt-2 outline-none focus:border-emerald-500" placeholder="Wat moet er anders?"></textarea>
                <button id="update" class="w-full bg-emerald-600 py-3 rounded-xl font-bold mt-2">UPDATE</button>
            </div>
        </div>

        <div class="pt-4 border-t border-slate-800 flex gap-2">
            <button id="dl" class="flex-1 bg-slate-800 py-3 rounded-xl text-xs font-bold"><i class="fas fa-download"></i> HTML</button>
            <button id="reset" class="flex-1 bg-red-900/20 py-3 rounded-xl text-xs font-bold text-red-500">RESET</button>
        </div>
    </aside>

    <main class="h-full w-full relative">
        <iframe id="view"></iframe>
        <div id="empty" class="absolute inset-0 flex flex-col items-center justify-center bg-[#020617]">
            <i class="fas fa-magic text-5xl text-indigo-500 mb-4"></i>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-xs">Kavrix DeepAgent Mode</p>
        </div>
    </main>

    <script>
        let code = localStorage.getItem('kavrix_code') || "";
        const RENDER_URL = "https://kavrix.onrender.com"; // VERVANG DIT DOOR JOUW URL

        const sidebar = document.getElementById("sidebar");
        const view = document.getElementById("view");
        const empty = document.getElementById("empty");

        document.getElementById("menuBtn").onclick = () => sidebar.classList.remove("sidebar-closed");
        document.getElementById("closeBtn").onclick = () => sidebar.classList.add("sidebar-closed");

        if(code) { view.srcdoc = code; empty.style.display = "none"; document.getElementById("editBox").classList.remove("hidden"); }

        async function askAI(p, isEdit) {
            document.getElementById("loader").style.display = "block";
            sidebar.classList.add("sidebar-closed");
            try {
                const r = await fetch(`${RENDER_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: p, existingCode: isEdit ? code : "" })
                });
                const d = await r.json();
                if(d.code) {
                    code = d.code;
                    localStorage.setItem('kavrix_code', code);
                    view.srcdoc = code;
                    empty.style.display = "none";
                    document.getElementById("editBox").classList.remove("hidden");
                } else { alert(d.error); }
            } catch(e) { alert("Server offline?"); }
            finally { document.getElementById("loader").style.display = "none"; }
        }

        document.getElementById("go").onclick = () => askAI(document.getElementById("prompt").value, false);
        document.getElementById("update").onclick = () => askAI(document.getElementById("edit").value, true);
        document.getElementById("reset").onclick = () => { localStorage.removeItem('kavrix_code'); location.reload(); };
        document.getElementById("dl").onclick = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([code], {type:'text/html'}));
            a.download = 'kavrix-app.html'; a.click();
        };
    </script>
</body>
</html>
