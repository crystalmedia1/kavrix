<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVRIX PRO | AI App Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: white; overflow: hidden; margin: 0; transition: all 0.5s ease; }
        .glass { background: rgba(23, 28, 41, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .sidebar { width: 280px; transition: all 0.3s ease; border-right: 1px solid rgba(255,255,255,0.05); }
        .preview-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #080b14; }
        .preview-container { height: 100%; width: 100%; border-radius: 32px; overflow: hidden; background: #161b2a; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: all 0.5s ease; }
        iframe { width: 100%; height: 100%; border: none; background: transparent; }
        .loader { border: 3px solid rgba(99, 102, 241, 0.1); border-left-color: #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #authOverlay { position: fixed; inset: 0; z-index: 1000; background: #0b0f1a; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen">

    <!-- AUTH SCHERM (OVERLAY) -->
    <div id="authOverlay">
        <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl border-indigo-500/20 text-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/40">
                <i data-lucide="zap" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2">KAVRIX <span class="text-indigo-500">PRO</span></h1>
            <p class="text-slate-400 text-sm mb-8" id="authSubtitle">Log in om apps te bouwen</p>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-indigo-500 transition text-white">
                <input type="password" id="password" placeholder="Wachtwoord" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-indigo-500 transition text-white">
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition shadow-lg shadow-indigo-600/20 text-white">Inloggen</button>
                <p class="text-xs text-slate-500">
                    Nog geen account? <a href="#" onclick="toggleAuthMode()" class="text-indigo-400 hover:underline" id="toggleLink">Registreer hier</a>
                </p>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside id="mainSidebar" class="sidebar glass h-full flex flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i data-lucide="zap" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">KAVRIX <span class="text-indigo-500">PRO</span></h1>
        </div>

        <div class="flex-1 overflow-y-auto space-y-2" id="projectList">
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold mb-4">Mijn Projecten</p>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition text-slate-400 hover:text-white">
                <i data-lucide="log-out" class="w-5 h-5"></i> <span>Uitloggen</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col relative">
        <header class="flex items-center justify-between p-6 border-b border-white/5">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-white/5 rounded-lg transition text-slate-400 hover:text-white"><i data-lucide="menu"></i></button>
                <input type="text" id="currentProjectName" value="Nieuw Project" class="bg-transparent border-none outline-none text-sm text-slate-400 font-medium focus:text-white transition w-48">
            </div>
            <button onclick="newProject()" class="px-4 py-2 bg-indigo-600 rounded-xl text-sm font-bold transition shadow-lg shadow-indigo-600/20 text-white">Nieuw</button>
        </header>

        <div class="preview-wrapper">
            <div id="previewContainer" class="preview-container glass">
                <div id="loadingOverlay" class="absolute inset-0 bg-[#0b0f1a]/90 flex flex-col items-center justify-center z-10 hidden">
                    <div class="loader mb-6"></div>
                    <p class="text-indigo-400 font-semibold animate-pulse uppercase tracking-widest">KAVRIX BOUWT JE APP...</p>
                </div>
                <iframe id="previewFrame" srcdoc="<body style='background:#161b2a; display:flex; align-items:center; justify-content:center; color:#475569; font-family:sans-serif; height:100vh; margin:0;'><h1>Beschrijf je idee om te beginnen</h1></body>"></iframe>
            </div>
        </div>

        <div class="p-6 border-t border-white/5">
            <div class="max-w-3xl mx-auto w-full">
                <div class="glass p-2 rounded-2xl flex items-center gap-2 shadow-2xl border-white/5 focus-within:border-indigo-500/50 transition-all">
                    <div class="pl-4 text-indigo-500"><i data-lucide="wand-2" class="w-5 h-5"></i></div>
                    <input type="text" id="promptInput" placeholder="Vraag KAVRIX om iets te bouwen..." class="flex-1 bg-transparent border-none outline-none px-2 py-4 text-sm text-white placeholder:text-slate-600" onkeydown="if(event.key==='Enter') generateApp()">
                    <button onclick="generateApp()" id="genBtn" class="bg-indigo-600 hover:bg-indigo-500 p-4 rounded-xl transition shadow-lg shadow-indigo-600/20 text-white">
                        <i data-lucide="zap" class="w-5 h-5 fill-current"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://kavrix.onrender.com"; 
        let userId = localStorage.getItem('kavrix_user_id');
        let token = localStorage.getItem('kavrix_token');
        let currentProjectId = null;
        let isLogin = true;
        let pollInterval = null;

        lucide.createIcons();

        // Check of we al ingelogd zijn
        if(userId && token) {
            document.getElementById('authOverlay').classList.add('hidden');
            loadProjects();
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('authBtn').innerText = isLogin ? 'Inloggen' : 'Registreren';
            document.getElementById('authSubtitle').innerText = isLogin ? 'Log in om apps te bouwen' : 'Maak een gratis account aan';
            document.getElementById('toggleLink').innerText = isLogin ? 'Registreer hier' : 'Log hier in';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const authBtn = document.getElementById('authBtn');
            const endpoint = isLogin ? '/login' : '/register';

            if(!email || !password) return alert("Vul alle velden in.");
            
            authBtn.innerText = "Bezig...";
            authBtn.disabled = true;

            try {
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if(data.token) {
                    // LOGIN GELUKT
                    localStorage.setItem('kavrix_token', data.token);
                    localStorage.setItem('kavrix_user_id', data.userId);
                    token = data.token;
                    userId = data.userId;
                    document.getElementById('authOverlay').classList.add('hidden');
                    loadProjects();
                } else if(data.message) {
                    // REGISTRATIE GELUKT
                    alert(data.message);
                    if(isLogin === false) toggleAuthMode();
                } else { 
                    alert("Fout: " + (data.error || "Onbekende fout")); 
                }
            } catch (e) {
                alert("Server onbereikbaar. Controleer of Render online is.");
            } finally {
                authBtn.innerText = isLogin ? 'Inloggen' : 'Registreren';
                authBtn.disabled = false;
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        async function loadProjects() {
            try {
                const res = await fetch(`${API_URL}/projects/${userId}`);
                const projects = await res.json();
                const list = document.getElementById('projectList');
                list.innerHTML = '<p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold mb-4">Mijn Projecten</p>';
                projects.forEach(p => {
                    const div = document.createElement('div');
                    div.className = "group flex items-center justify-between p-3 rounded-xl hover:bg-white/5 transition cursor-pointer";
                    div.innerHTML = `<div class="flex items-center gap-3 flex-1 overflow-hidden" onclick="openProject('${p._id}')"><i data-lucide="layout" class="text-slate-500 w-4 h-4"></i><span class="text-xs font-medium truncate text-slate-400 group-hover:text-white">${p.name}</span></div><button onclick="deleteProject('${p._id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) { console.error("Laden mislukt"); }
        }

        async function generateApp() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            try {
                const res = await fetch(`${API_URL}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, userId, token, projectId: currentProjectId })
                });
                const data = await res.json();
                if(data.error) {
                    alert(data.error);
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    return;
                }
                currentProjectId = data.projectId;
                if(pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(checkStatus, 3000);
            } catch (e) { document.getElementById('loadingOverlay').classList.add('hidden'); }
        }

        async function checkStatus() {
            try {
                const res = await fetch(`${API_URL}/project/${currentProjectId}`);
                const data = await res.json();
                if (data.files && data.files.html !== "GENERATING") {
                    clearInterval(pollInterval);
                    renderApp(data.files);
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    document.getElementById('promptInput').value = "";
                    loadProjects();
                }
            } catch (e) { console.error("Polling..."); }
        }

        function renderApp(files) {
            const frame = document.getElementById('previewFrame');
            frame.srcdoc = `<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"><\/script><style>${files.css}</style></head><body>${files.html}<script>${files.js}<\/script></body></html>`;
        }

        async function openProject(id) {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const res = await fetch(`${API_URL}/project/${id}`);
            const data = await res.json();
            renderApp(data.files);
            document.getElementById('currentProjectName').value = data.name;
            currentProjectId = id;
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        async function deleteProject(id) {
            if(!confirm("Verwijderen?")) return;
            await fetch(`${API_URL}/project/${id}`, { method: 'DELETE' });
            loadProjects();
            if(currentProjectId === id) newProject();
        }

        function toggleSidebar() {
            const sb = document.getElementById('mainSidebar');
            sb.style.width = sb.style.width === "0px" ? "280px" : "0px";
            sb.style.opacity = sb.style.opacity === "0" ? "1" : "0";
        }

        function newProject() {
            currentProjectId = null;
            document.getElementById('previewFrame').srcdoc = "<body></body>";
            document.getElementById('currentProjectName').value = "Nieuw Project";
        }
    </script>
</body>
</html>
