<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVRIX | DeepAgent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 24px; }
        .loader { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: #4f46e5; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body class="flex flex-col p-4">

    <div id="loader" class="loader">DeepAgent is aan het bouwen... <i class="fas fa-spinner animate-spin ml-2"></i></div>

    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black tracking-tighter">KAVRIX</h1>
        <div class="flex gap-2">
            <button onclick="toggleSidebar()" class="p-3 bg-slate-900 rounded-xl"><i class="fas fa-history"></i></button>
            <button onclick="location.reload()" class="p-3 bg-slate-900 rounded-xl"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <div class="flex-1 relative">
        <div id="empty" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
            <i class="fas fa-magic text-4xl mb-4"></i>
            <p>Voer een opdracht in om te beginnen.</p>
        </div>
        <iframe id="preview" class="hidden"></iframe>
    </div>

    <div class="mt-4 flex gap-2 bg-slate-900 p-2 rounded-2xl">
        <input id="prompt" type="text" class="flex-1 bg-transparent border-none outline-none p-3 text-sm" placeholder="Wat wil je bouwen?">
        <button id="go" class="bg-indigo-600 px-6 py-3 rounded-xl font-bold text-sm">Bouw</button>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-950 border-right border-white/10 p-6 transform -translate-x-full transition-transform z-50">
        <button onclick="toggleSidebar()" class="mb-8 text-slate-500">Sluiten</button>
        <div id="projectList" class="space-y-2"></div>
    </div>

    <script>
        const RENDER_URL = "https://kavrix.onrender.com";
        let currentId = null;
        let pollInterval = null;

        async function loadProjects() {
            const r = await fetch(`${RENDER_URL}/projects`);
            const data = await r.json();
            const list = document.getElementById("projectList");
            list.innerHTML = "";
            data.forEach(p => {
                const btn = document.createElement("button");
                btn.className = "w-full text-left p-3 text-xs hover:bg-white/5 rounded-lg";
                btn.innerText = p.name;
                btn.onclick = () => { selectProject(p.id); toggleSidebar(); };
                list.appendChild(btn);
            });
        }

        async function selectProject(id) {
            currentId = id;
            const r = await fetch(`${RENDER_URL}/project/${id}`);
            const d = await r.json();
            
            if (d.code === "GENERATING") {
                startPolling(id);
            } else {
                const iframe = document.getElementById("preview");
                iframe.srcdoc = d.code;
                iframe.classList.remove("hidden");
                document.getElementById("empty").classList.add("hidden");
                document.getElementById("loader").style.display = "none";
            }
        }

        function startPolling(id) {
            document.getElementById("loader").style.display = "block";
            if (pollInterval) clearInterval(pollInterval);
            
            pollInterval = setInterval(async () => {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                if (d.code !== "GENERATING") {
                    clearInterval(pollInterval);
                    selectProject(id);
                }
            }, 3000); // Check elke 3 seconden
        }

        async function run() {
            const p = document.getElementById("prompt").value;
            if (!p) return;
            
            document.getElementById("loader").style.display = "block";
            const r = await fetch(`${RENDER_URL}/generate`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: p, projectId: currentId })
            });
            const d = await r.json();
            startPolling(d.projectId);
            document.getElementById("prompt").value = "";
        }

        function toggleSidebar() {
            const s = document.getElementById("sidebar");
            s.classList.toggle("-translate-x-full");
            if (!s.classList.contains("-translate-x-full")) loadProjects();
        }

        document.getElementById("go").onclick = run;
        document.getElementById("prompt").onkeydown = (e) => { if(e.key === 'Enter') run(); };
    </script>
</body>
</html>
