<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX | DeepAgent Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 0px; md:border-radius: 24px; }
        .loader-line { height: 3px; width: 0%; background: linear-gradient(to right, #6366f1, #a855f7); transition: 0.5s; position: fixed; top: 0; left: 0; z-index: 1000; }
        
        /* Mobiele Zijbalk Logica */
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        .sidebar-closed { transform: translateX(-100%); }
        .sidebar-open { transform: translateX(0); }

        .command-center {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 94%;
            max-width: 800px;
            z-index: 40;
        }

        .active-project { background: rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.4); color: #818cf8; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="loaderLine" class="loader-line"></div>

    <!-- Mobiele Menu Knop -->
    <button onclick="toggleSidebar()" class="fixed top-4 left-4 z-[60] bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg md:hidden">
        <i class="fas fa-bars text-white"></i>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:relative w-72 h-full glass border-r border-white/5 flex flex-col p-6 sidebar-closed md:sidebar-open shrink-0">
        <div class="flex items-center gap-3 mb-10 px-2 mt-10 md:mt-0">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i class="fas fa-brain text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter leading-none">KAVRIX</h1>
                <span class="text-[9px] text-indigo-400 font-bold uppercase tracking-widest">DeepAgent v5.2</span>
            </div>
        </div>

        <button onclick="newProject()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest mb-8 hover:bg-indigo-500 transition-all">
            + Nieuw Project
        </button>

        <div class="flex-1 overflow-y-auto space-y-2 pr-2" id="projectList">
            <!-- Projecten -->
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden h-full">
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-[#020617] p-6 text-center">
            <div class="w-20 h-20 bg-slate-900 rounded-[28px] flex items-center justify-center mb-6 border border-white/5">
                <i class="fas fa-wand-magic-sparkles text-3xl text-indigo-500"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 tracking-tight">Kavrix DeepEngine</h2>
            <p class="text-slate-500 text-xs max-w-xs leading-relaxed">Beschrijf je app hieronder om te beginnen.</p>
        </div>

        <div class="flex-1 relative z-0 h-full w-full">
            <iframe id="preview" class="hidden w-full h-full"></iframe>
        </div>

        <!-- Command Center -->
        <div class="command-center">
            <div class="glass rounded-[24px] p-1.5 flex items-center shadow-2xl border border-white/10">
                <input id="prompt" type="text" class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-sm font-medium placeholder:text-slate-600 text-white" placeholder="Beschrijf je app...">
                <button id="go" class="bg-indigo-600 w-12 h-12 rounded-[18px] flex items-center justify-center hover:bg-indigo-500 transition-all active:scale-95 shrink-0">
                    <i class="fas fa-bolt text-white"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const RENDER_URL = "https://kavrix.onrender.com";
        let currentId = localStorage.getItem('kavrix_id');
        let pollInterval = null;

        function toggleSidebar() {
            const s = document.getElementById("sidebar");
            s.classList.toggle("sidebar-closed");
            s.classList.toggle("sidebar-open");
        }

        async function loadProjects() {
            try {
                const r = await fetch(`${RENDER_URL}/projects`);
                const data = await r.json();
                const list = document.getElementById("projectList");
                list.innerHTML = "";
                data.forEach(p => {
                    const div = document.createElement("div");
                    div.className = `p-4 flex justify-between items-center rounded-xl border border-transparent transition-all ${currentId === p.id ? 'active-project' : 'hover:bg-white/5'}`;
                    div.innerHTML = `
                        <button class="flex-1 text-left text-[10px] font-bold truncate pr-2 uppercase tracking-wider">${p.name || 'Naamloos'}</button>
                        <button onclick="deleteProject('${p.id}', event)" class="text-slate-600 hover:text-red-500">
                            <i class="fas fa-trash-alt text-[10px]"></i>
                        </button>
                    `;
                    div.querySelector('button').onclick = () => {
                        selectProject(p.id);
                        if(window.innerWidth < 768) toggleSidebar();
                    };
                    list.appendChild(div);
                });
            } catch(e) {}
        }

        async function selectProject(id) {
            currentId = id;
            localStorage.setItem('kavrix_id', id);
            document.getElementById("loaderLine").style.width = "30%";
            try {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                if (d.code === "GENERATING") {
                    startPolling(id);
                } else {
                    stopPolling();
                    const iframe = document.getElementById("preview");
                    iframe.srcdoc = d.code;
                    iframe.classList.remove("hidden");
                    document.getElementById("emptyState").classList.add("hidden");
                    loadProjects();
                }
            } catch(e) {}
        }

        function startPolling(id) {
            document.getElementById("loaderLine").style.width = "60%";
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                if (d.code !== "GENERATING") selectProject(id);
            }, 3000);
        }

        function stopPolling() {
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById("loaderLine").style.width = "100%";
            setTimeout(() => document.getElementById("loaderLine").style.width = "0%", 600);
        }

        async function run() {
            const p = document.getElementById("prompt").value;
            if (!p) return;
            document.getElementById("loaderLine").style.width = "20%";
            try {
                const r = await fetch(`${RENDER_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: p, projectId: currentId })
                });
                const d = await r.json();
                startPolling(d.projectId);
                document.getElementById("prompt").value = "";
            } catch(e) { alert("Fout"); }
        }

        async function deleteProject(id, e) {
            e.stopPropagation();
            if(!confirm("Verwijderen?")) return;
            await fetch(`${RENDER_URL}/delete-project/${id}`, { method: "DELETE" });
            if(currentId === id) newProject(); else loadProjects();
        }

        function newProject() {
            currentId = null;
            localStorage.removeItem('kavrix_id');
            location.reload();
        }

        document.getElementById("go").onclick = run;
        document.getElementById("prompt").onkeydown = (e) => { if(e.key === 'Enter') run(); };
        if(currentId) selectProject(currentId);
        loadProjects();
    </script>
</body>
</html>
