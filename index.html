<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVRIX | DeepAgent Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        #sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; background: #0f172a; border-right: 1px solid #1e293b; }
        .sidebar-closed { transform: translateX(-100%); }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 12px; }
        .agent-status { display: none; position: fixed; bottom: 30px; right: 30px; background: #1e293b; padding: 15px 25px; border-radius: 15px; border: 1px solid #334155; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .dot { height: 8px; width: 8px; background: #6366f1; border-radius: 50%; display: inline-block; margin-right: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.4; transform: scale(1); } }
    </style>
</head>
<body>
    <!-- Floating Menu Button -->
    <button id="menuBtn" class="fixed top-6 left-6 w-14 h-14 bg-indigo-600 text-white rounded-2xl z-[250] shadow-xl flex items-center justify-center hover:bg-indigo-500 transition-all">
        <i class="fas fa-wand-magic-sparkles text-xl"></i>
    </button>

    <!-- Agent Status Indicator -->
    <div id="agentStatus" class="agent-status">
        <div class="flex items-center">
            <span class="dot"></span>
            <span id="statusText" class="text-xs font-bold uppercase tracking-widest text-slate-300">Agent denkt na...</span>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-full md:w-[400px] h-full p-8 flex flex-col sidebar-closed">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black italic">KAVRIX <span class="text-indigo-500 text-sm">DEEP-AGENT</span></h1>
            <button id="closeBtn" class="text-slate-400 hover:text-white text-2xl">&times;</button>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">Opdracht voor de Agent</label>
                <textarea id="prompt" class="w-full h-40 bg-slate-900 border border-slate-800 rounded-2xl p-5 outline-none focus:border-indigo-500 text-sm resize-none" placeholder="Beschrijf de app die de agent moet bouwen..."></textarea>
            </div>
            <button id="go" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black text-sm transition-all active:scale-95">
                START AGENT PROCESS
            </button>
        </div>

        <div id="projectInfo" class="mt-10 hidden p-5 bg-slate-900/50 border border-slate-800 rounded-2xl">
            <p id="projectTitle" class="text-xs italic text-slate-400 mb-4"></p>
            <div class="flex gap-2">
                <button id="dl" class="flex-1 bg-slate-800 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Download</button>
                <button id="reset" class="flex-1 bg-red-500/10 text-red-500 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Reset</button>
            </div>
        </div>
    </aside>

    <!-- Main View -->
    <main class="h-full w-full p-4 md:p-8">
        <div id="empty" class="h-full w-full flex flex-col items-center justify-center text-center">
            <div class="w-20 h-20 bg-indigo-600/10 rounded-3xl flex items-center justify-center mb-6 border border-indigo-500/20">
                <i class="fas fa-robot text-3xl text-indigo-500"></i>
            </div>
            <h2 class="text-xl font-bold mb-2">Kavrix DeepAgent v1.0</h2>
            <p class="text-slate-500 text-sm max-w-xs">Klaar om complexe applicaties te bouwen en te valideren.</p>
        </div>
        <iframe id="view" class="hidden"></iframe>
    </main>

    <script>
        const RENDER_URL = "https://kavrix.onrender.com";
        let currentCode = "";
        let currentProjectId = localStorage.getItem('kavrix_id');

        const statusDiv = document.getElementById("agentStatus");
        const statusText = document.getElementById("statusText");

        function updateStatus(text) {
            statusDiv.style.display = "block";
            statusText.innerText = text;
        }

        async function askAgent() {
            const p = document.getElementById("prompt").value;
            if(!p) return;

            document.getElementById("sidebar").classList.add("sidebar-closed");
            updateStatus("Agent analyseert opdracht...");

            try {
                // Fase 1: Genereren
                setTimeout(() => updateStatus("Agent bouwt de code..."), 2000);
                
                const r = await fetch(`${RENDER_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: p, existingCode: currentCode, projectId: currentProjectId })
                });
                
                updateStatus("Agent controleert op fouten...");
                
                const d = await r.json();
                if(d.code) {
                    currentCode = d.code;
                    currentProjectId = d.projectId;
                    localStorage.setItem('kavrix_id', d.projectId);
                    
                    const view = document.getElementById("view");
                    view.srcdoc = currentCode;
                    view.classList.remove("hidden");
                    document.getElementById("empty").classList.add("hidden");
                    document.getElementById("projectInfo").classList.remove("hidden");
                    document.getElementById("projectTitle").innerText = `Project: ${p.substring(0,20)}...`;
                }
            } catch(e) {
                alert("Agent Error: " + e.message);
            } finally {
                statusDiv.style.display = "none";
            }
        }

        document.getElementById("go").onclick = askAgent;
        document.getElementById("menuBtn").onclick = () => document.getElementById("sidebar").classList.remove("sidebar-closed");
        document.getElementById("closeBtn").onclick = () => document.getElementById("sidebar").classList.add("sidebar-closed");
        document.getElementById("reset").onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById("dl").onclick = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([currentCode], {type:'text/html'}));
            a.download = 'agent-app.html'; a.click();
        };
    </script>
</body>
</html>
