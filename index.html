<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kavrix AI | Professionele App Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
  />
  <style>
    body {
      background-color: #020617;
      color: #cbd5e1;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    #sidebar {
      transition: transform 0.3s ease;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border-right: 1px solid #334155;
      z-index: 50;
    }
    .sidebar-closed {
      transform: translateX(-100%);
    }
    iframe {
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      background: white;
      width: 100%;
      height: 100%;
      border: none;
    }
    .loader {
      border-top-color: #6366f1;
      animation: spinner 0.6s linear infinite;
    }
    @keyframes spinner {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body class="flex flex-col h-screen">

  <!-- Top Bar -->
  <header class="h-16 flex items-center justify-between px-6 bg-[#0f172a] border-b border-slate-800">
    <div class="flex items-center gap-4">
      <button id="menuToggle" class="md:hidden w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
        <i class="fas fa-bars text-white"></i>
      </button>
      <h1 class="text-xl font-bold tracking-tight">KAVRIX <span class="text-indigo-400">AI</span></h1>
    </div>
    <div class="flex items-center gap-4">
      <button id="downloadBtn" class="hidden md:inline-flex items-center gap-2 bg-cyan-600 hover:bg-cyan-700 px-4 py-2 rounded-lg font-semibold text-sm">
        <i class="fas fa-download"></i> Download app
      </button>
      <button id="resetBtn" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-400">
        <i class="fas fa-trash-alt"></i>
      </button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:relative top-16 left-0 w-80 h-full p-6 sidebar-closed md:sidebar-closed md:translate-x-0 md:opacity-100 md:pointer-events-auto">
      <div class="flex flex-col h-full">
        <label for="promptInput" class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Nieuw Project</label>
        <textarea id="promptInput" rows="6" class="mb-4 p-4 rounded-xl bg-[#020617] border border-slate-700 text-sm resize-none focus:outline-none focus:border-indigo-500" placeholder="Beschrijf je app..."></textarea>
        <button id="buildBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl font-bold text-white transition">Bouw app</button>

        <label for="editInput" class="text-xs font-bold text-indigo-400 uppercase tracking-widest mt-8 mb-2 opacity-50 pointer-events-none" id="editLabel">Aanpassen & Chat</label>
        <textarea id="editInput" rows="5" class="mb-4 p-4 rounded-xl bg-[#020617] border border-slate-700 text-sm resize-none focus:outline-none focus:border-indigo-500 opacity-50 pointer-events-none" placeholder="Wat moet er anders?" disabled></textarea>
        <button id="editBtn" class="w-full bg-indigo-400 py-3 rounded-xl font-bold text-white transition opacity-50 pointer-events-none" disabled>Pas aan</button>

        <div id="statusArea" class="hidden mt-auto p-4 bg-indigo-600/10 border border-indigo-500/30 rounded-xl flex items-center gap-3">
          <div class="loader w-5 h-5 border-2 border-indigo-200 rounded-full"></div>
          <span class="text-xs font-bold text-indigo-300 uppercase tracking-widest">AI is aan het bouwen...</span>
        </div>
      </div>
    </aside>

    <!-- Preview -->
    <main class="flex-1 p-6 bg-[#020617]">
      <iframe id="previewFrame" title="Preview van de app"></iframe>
    </main>
  </div>

  <script>
    (() => {
      const sidebar = document.getElementById('sidebar');
      const menuToggle = document.getElementById('menuToggle');
      const buildBtn = document.getElementById('buildBtn');
      const editBtn = document.getElementById('editBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const resetBtn = document.getElementById('resetBtn');
      const promptInput = document.getElementById('promptInput');
      const editInput = document.getElementById('editInput');
      const editLabel = document.getElementById('editLabel');
      const previewFrame = document.getElementById('previewFrame');
      const statusArea = document.getElementById('statusArea');

      let currentCode = localStorage.getItem('kavrix_code') || '';

      // Sidebar toggle for mobile
      menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('sidebar-closed');
      });

      // Load saved code if any
      if (currentCode) {
        previewFrame.srcdoc = currentCode;
        enableEditMode();
      }

      function enableEditMode() {
        editInput.disabled = false;
        editInput.classList.remove('opacity-50', 'pointer-events-none');
        editLabel.classList.remove('opacity-50');
        editBtn.disabled = false;
        editBtn.classList.remove('opacity-50', 'pointer-events-none');
        downloadBtn.classList.remove('hidden');
      }

      function disableEditMode() {
        editInput.disabled = true;
        editInput.classList.add('opacity-50', 'pointer-events-none');
        editLabel.classList.add('opacity-50');
        editBtn.disabled = true;
        editBtn.classList.add('opacity-50', 'pointer-events-none');
        downloadBtn.classList.add('hidden');
      }

      function showStatus() {
        statusArea.classList.remove('hidden');
      }

      function hideStatus() {
        statusArea.classList.add('hidden');
      }

      async function callAI(prompt, isEdit = false) {
        const btn = isEdit ? editBtn : buildBtn;
        btn.disabled = true;
        showStatus();

        try {
          const response = await fetch('https://kavrix.onrender.com/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt,
              existingCode: isEdit ? currentCode : ''
            })
          });

          const data = await response.json();

          if (data.code) {
            currentCode = data.code;
            localStorage.setItem('kavrix_code', currentCode);
            previewFrame.srcdoc = currentCode;
            enableEditMode();
            sidebar.classList.add('sidebar-closed');
          } else if (data.error) {
            alert('AI fout: ' + data.error);
          }
        } catch (e) {
          alert('Er is een fout opgetreden: ' + e.message);
        } finally {
          btn.disabled = false;
          hideStatus();
        }
      }

      buildBtn.addEventListener('click', () => {
        const prompt = promptInput.value.trim();
        if (prompt) callAI(prompt, false);
      });

      editBtn.addEventListener('click', () => {
        const prompt = editInput.value.trim();
        if (prompt) callAI(prompt, true);
      });

      downloadBtn.addEventListener('click', () => {
        if (!currentCode) return alert('Geen app om te downloaden.');
        const blob = new Blob([currentCode], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'kavrix_app.html';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });

      resetBtn.addEventListener('click', () => {
        if (confirm('Weet je zeker dat je het project wilt resetten?')) {
          localStorage.removeItem('kavrix_code');
          currentCode = '';
          previewFrame.srcdoc = '';
          promptInput.value = '';
          editInput.value = '';
          disableEditMode();
        }
      });

      // Start with edit mode disabled if no code
      if (!currentCode) disableEditMode();
    })();
  </script>
</body>
</html>
