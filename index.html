<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX ENTERPRISE | AI App Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        #sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-closed { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        iframe { background: white; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .loader-bar { height: 3px; width: 100%; background: #1e293b; position: relative; overflow: hidden; border-radius: 10px; }
        .loader-progress { height: 100%; background: #6366f1; position: absolute; animation: loading 2s infinite ease-in-out; }
        @keyframes loading { 0% { left: -40%; width: 40%; } 50% { left: 20%; width: 80%; } 100% { left: 100%; width: 40%; } }
    </style>
</head>
<body class="overflow-hidden">

    <!-- Header -->
    <nav class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-[#0f172a]/80 backdrop-blur-md z-50 relative">
        <div class="flex items-center gap-4">
            <button id="menuToggle" class="w-10 h-10 flex items-center justify-center bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                <i class="fas fa-rocket text-white"></i>
            </button>
            <h1 class="text-xl font-extrabold tracking-tighter text-white hidden sm:block">KAVRIX <span class="text-indigo-400">ENTERPRISE</span></h1>
        </div>

        <div class="flex items-center gap-3">
            <button id="downloadBtn" class="hidden sm:flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-xl text-xs font-bold transition-all">
                <i class="fas fa-download"></i> EXPORTEER APP
            </button>
            <button id="resetBtn" class="w-10 h-10 flex items-center justify-center text-slate-500 hover:text-red-400 transition-colors">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-64px)] relative">
        <!-- Sidebar -->
        <aside id="sidebar" class="absolute inset-0 md:relative md:w-[400px] glass border-r border-slate-800 p-6 flex flex-col z-40 sidebar-closed md:transform-none md:opacity-100 md:pointer-events-auto">
            <div class="flex-1 overflow-y-auto space-y-8 pr-2">
                
                <!-- Build Section -->
                <div class="space-y-4">
                    <label class="text-[11px] font-black text-indigo-400 uppercase tracking-widest">Nieuw Project</label>
                    <textarea id="promptInput" class="w-full h-32 bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-sm outline-none focus:border-indigo-500 transition-all" placeholder="Beschrijf je app (bijv: Een fitness tracker met grafieken)..."></textarea>
                    <button id="buildBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-black text-sm shadow-xl shadow-indigo-600/20 transition-all active:scale-[0.98]">
                        START GENERATIE
                    </button>
                </div>

                <!-- Chat & Edit Section -->
                <div id="editSection" class="space-y-4 opacity-30 pointer-events-none transition-all">
                    <label class="text-[11px] font-black text-emerald-400 uppercase tracking-widest">Aanpassen & Chat</label>
                    <textarea id="editInput" class="w-full h-24 bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-sm outline-none focus:border-emerald-500 transition-all" placeholder="Wat wil je veranderen aan de huidige versie?"></textarea>
                    <button id="editBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-2xl font-black text-sm shadow-xl shadow-emerald-600/20 transition-all">
                        UPDATE DOORVOEREN
                    </button>
                </div>

                <!-- Status Area -->
                <div id="statusArea" class="hidden space-y-3 p-4 bg-indigo-600/10 border border-indigo-500/30 rounded-2xl">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-indigo-300 uppercase">AI Architect is bezig...</span>
                        <i class="fas fa-circle-notch fa-spin text-indigo-400 text-xs"></i>
                    </div>
                    <div class="loader-bar"><div class="loader-progress"></div></div>
                </div>
            </div>

            <div class="pt-4 border-t border-slate-800 text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Powered by Kavrix Engine v7.0</p>
            </div>
        </aside>

        <!-- Main Viewport -->
        <main class="flex-1 bg-[#020617] p-3 md:p-6 flex flex-col">
            <div class="flex-1 relative">
                <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center bg-[#020617] z-10">
                    <div class="w-24 h-24 bg-indigo-600/10 rounded-[2rem] flex items-center justify-center mb-6 border border-indigo-500/20">
                        <i class="fas fa-code text-4xl text-indigo-500"></i>
                    </div>
                    <h2 class="text-2xl font-extrabold text-white tracking-tight">Klaar voor de start?</h2>
                    <p class="text-slate-500 text-sm mt-2 max-w-xs text-center">Beschrijf je app in het menu links en zie hoe de AI je visie tot leven brengt.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentCode = localStorage.getItem('kavrix_enterprise_code') || "";
        const sidebar = document.getElementById("sidebar");
        const preview = document.getElementById("previewFrame");
        const empty = document.getElementById("emptyState");

        // UI Logic
        document.getElementById("menuToggle").onclick = () => sidebar.classList.toggle("sidebar-closed");
        
        if(currentCode) {
            preview.srcdoc = currentCode;
            empty.classList.add("hidden");
            document.getElementById("editSection").classList.remove("opacity-30", "pointer-events-none");
            document.getElementById("downloadBtn").classList.remove("hidden");
        }

        async function callAI(prompt, isEdit = false) {
            const btn = isEdit ? document.getElementById("editBtn") : document.getElementById("buildBtn");
            const status = document.getElementById("statusArea");
            
            btn.disabled = true;
            status.classList.remove("hidden");

            try {
                const response = await fetch("https://kavrix.onrender.com/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt, existingCode: isEdit ? currentCode : "" })
                });

                const data = await response.json();
                if (data.code) {
                    currentCode = data.code;
                    localStorage.setItem('kavrix_enterprise_code', currentCode);
                    preview.srcdoc = data.code;
                    empty.classList.add("hidden");
                    document.getElementById("editSection").classList.remove("opacity-30", "pointer-events-none");
                    document.getElementById("downloadBtn").classList.remove("hidden");
                    if(window.innerWidth < 768) sidebar.classList.add("sidebar-closed");
                } else {
                    alert("AI Error: " + (data.error || "Onbekende fout"));
                }
            } catch (e) { 
                alert("Verbinding met de server mislukt. Controleer of Render online is."); 
            } finally { 
                btn.disabled = false; 
                status.classList.add("hidden"); 
            }
        }

        document.getElementById("buildBtn").onclick = () => {
            const p = document.getElementById("promptInput").value.trim();
            if(p) callAI(p, false);
        };

        document.getElementById("editBtn").onclick = () => {
            const p = document.getElementById("editInput").value.trim();
            if(p) callAI(p, true);
        };

        document.getElementById("resetBtn").onclick = () => {
            if(confirm("Wil je het huidige project volledig wissen?")) {
                localStorage.removeItem('kavrix_enterprise_code');
                location.reload();
            }
        };

        document.getElementById("downloadBtn").onclick = () => {
            const blob = new Blob([currentCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'kavrix-app-export.html';
            a.click();
        };
    </script>
</body>
</html>
