<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Racing Frenzy</title>
  <style>
    html,body{height:100%;margin:0;background:#0b1020;color:#fff;font-family:Inter,system-ui,Arial}
    .wrap{display:flex;flex-direction:column;height:100%;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
    canvas{background:linear-gradient(#2b3344,#0f1724);border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,0.6)}
    .hud{margin-top:14px;display:flex;gap:12px;align-items:center}
    .btn{background:#111827;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);cursor:pointer}
    .score{font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="480" height="720"></canvas>
    <div class="hud">
      <div class="btn">Gebruik pijltjestoetsen ← → om te sturen</div>
      <div class="btn">R: reset</div>
      <div class="score" id="time">Tijd: 0.00s</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const W = canvas.width, H = canvas.height;
    let last = performance.now();
    let elapsed = 0;
    let running = false;
    let startTime = 0;

    // Player (auto)
    const car = {
      x: W/2,
      y: H - 120,
      w: 40,
      h: 70,
      speed: 0,
      maxSpeed: 6,
      accel: 0.25,
      decel: 0.2,
      dir: 0
    };

    // Track / obstacles simple
    const finishY = 80;
    const obstacles = [];
    for(let i=0;i<8;i++){
      obstacles.push({
        x: 60 + Math.random()*(W-120),
        y: 120 + i*70 + Math.random()*40,
        r: 18 + Math.random()*12
      });
    }

    const keys = {};
    window.addEventListener('keydown', e=>{ keys[e.key]=true; if (e.key==='r') reset(); });
    window.addEventListener('keyup', e=>{ keys[e.key]=false; });

    function reset(){
      car.x = W/2; car.speed=0; car.dir=0; elapsed=0; running=false; startTime = performance.now(); 
      // randomize obstacles
      obstacles.forEach((o,i)=>{ o.x = 60 + Math.random()*(W-120); o.y = 120 + i*70 + Math.random()*40; });
    }

    function update(dt){
      // start timer after first input
      if (!running && (keys.ArrowLeft || keys.ArrowRight || keys.ArrowUp)) {
        running = true; startTime = performance.now();
      }

      // steering
      if (keys.ArrowLeft) { car.dir = -1; car.speed = Math.max(-car.maxSpeed, car.speed - car.accel); }
      else if (keys.ArrowRight) { car.dir = 1; car.speed = Math.min(car.maxSpeed, car.speed + car.accel); }
      else { // natural decel
        if (car.speed > 0) car.speed = Math.max(0, car.speed - car.decel);
        if (car.speed < 0) car.speed = Math.min(0, car.speed + car.decel);
        car.dir = 0;
      }

      car.x += car.speed * 0.9;
      // clamp to road
      car.x = Math.max(40, Math.min(W-40, car.x));

      // move obstacles downward relative to car speed to simulate movement
      for(const o of obstacles) {
        o.y += Math.abs(car.speed)*0.7 + 1;
        if (o.y > H+50) {
          o.y = -40 - Math.random()*80;
          o.x = 60 + Math.random()*(W-120);
        }
      }

      // collision
      for(const o of obstacles) {
        const dx = o.x - car.x;
        const dy = o.y - car.y + 10;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < o.r + Math.max(car.w, car.h)/3) {
          // collision -> bounce back a bit and slow
          car.speed *= -0.4;
          car.x += (dx/dist) * 20;
        }
      }

      // finish check (if any obstacle passes finish line while player Y less than finish)
      if (car.y <= finishY + 30) {
        // nothing (we keep static player)
      }

      // update timer
      if (running) {
        elapsed = (performance.now() - startTime) / 1000;
        document.getElementById('time').innerText = 'Tijd: ' + elapsed.toFixed(2) + 's';
      }
    }

    function draw(){
      // background
      ctx.clearRect(0,0,W,H);
      // road
      ctx.fillStyle = '#0b1220';
      ctx.fillRect(40,0,W-80,H);
      // side strips
      ctx.fillStyle = '#071023';
      ctx.fillRect(0,0,40,H);
      ctx.fillRect(W-40,0,40,H);
      // center dashed line
      ctx.strokeStyle = '#263749';
      ctx.lineWidth = 6;
      ctx.setLineDash([24,18]);
      ctx.beginPath();
      ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
      ctx.setLineDash([]);

      // finish line
      ctx.fillStyle = '#fff';
      ctx.fillRect(40, finishY, W-80, 6);

      // obstacles
      for(const o of obstacles) {
        ctx.beginPath();
        ctx.fillStyle = '#d94b4b';
        ctx.arc(o.x, o.y, o.r, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(o.x-10, o.y-4, 20, 3);
      }

      // player car
      ctx.save();
      ctx.translate(car.x, car.y);
      // body
      ctx.fillStyle = '#10b981';
      ctx.fillRect(-car.w/2, -car.h/2, car.w, car.h);
      // windows
      ctx.fillStyle = '#071023';
      ctx.fillRect(-car.w/3, -car.h/2 + 8, car.w*0.6, car.h*0.25);
      // wheels
      ctx.fillStyle = '#111827';
      ctx.fillRect(-car.w/2 - 5, car.h/4, 12, 6);
      ctx.fillRect(car.w/2 - 7, car.h/4, 12, 6);
      ctx.restore();

      // HUD small
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(12,12,140,36);
      ctx.fillStyle = '#fff';
      ctx.font = '14px Arial';
      ctx.fillText('Speed: ' + Math.abs(Math.round(car.speed*10)), 20, 36);
    }

    function loop(now){
      const dt = (now - last) / 1000;
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    // init
    reset();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
