<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX | Enterprise AI App Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        #sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; background: #0f172a; border-right: 1px solid #1e293b; }
        .sidebar-closed { transform: translateX(-100%); }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 12px; }
        .loader { height: 3px; width: 100%; background: #1e293b; position: fixed; top: 0; z-index: 300; display: none; }
        .progress { height: 100%; background: #6366f1; width: 40%; position: absolute; animation: load 1.5s infinite linear; }
        @keyframes load { 0% { left: -40%; } 100% { left: 100%; } }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body>
    <div id="loader" class="loader"><div class="progress"></div></div>
    
    <!-- Floating Menu Button -->
    <button id="menuBtn" class="fixed top-6 left-6 w-14 h-14 bg-indigo-600 text-white rounded-2xl z-[250] shadow-2xl shadow-indigo-600/40 active:scale-90 transition-all hover:bg-indigo-500 flex items-center justify-center">
        <i class="fas fa-wand-magic-sparkles text-xl"></i>
    </button>

    <!-- Sidebar Builder -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-full md:w-[400px] h-full p-8 flex flex-col sidebar-closed shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black tracking-tighter italic">KAVRIX <span class="text-indigo-500">v9.0</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">Enterprise App Engine</p>
            </div>
            <button id="closeBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-slate-400 hover:text-white transition-colors">&times;</button>
        </div>

        <div class="flex-1 overflow-y-auto space-y-8 pr-2">
            <!-- Input Section -->
            <div class="space-y-4">
                <div class="flex items-center gap-2 text-indigo-400">
                    <i class="fas fa-terminal text-xs"></i>
                    <label class="text-[11px] font-black uppercase tracking-widest">AI Command Center</label>
                </div>
                <textarea id="prompt" class="w-full h-40 bg-slate-900/50 border border-slate-800 rounded-2xl p-5 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 text-sm transition-all resize-none" placeholder="Wat gaan we vandaag bouwen? Beschrijf je app in detail..."></textarea>
                <button id="go" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black text-sm shadow-xl shadow-indigo-600/20 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                    <span>GENEREER APP</span>
                    <i class="fas fa-arrow-right text-xs opacity-50"></i>
                </button>
            </div>

            <!-- History / Status -->
            <div id="statusBox" class="hidden p-5 rounded-2xl bg-slate-900/30 border border-slate-800/50">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Project Actief</span>
                </div>
                <p id="projectTitle" class="text-xs text-slate-300 italic mb-4">"Geen project geladen"</p>
                <div class="grid grid-cols-2 gap-2">
                    <button id="dl" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-colors"><i class="fas fa-code mr-2"></i> Code</button>
                    <button id="reset" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-colors">Reset</button>
                </div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-slate-800/50 text-center">
            <p class="text-[9px] text-slate-600 font-medium uppercase tracking-widest">Powered by Kavrix Intelligence Router</p>
        </div>
    </aside>

    <!-- Main Preview Area -->
    <main class="h-full w-full p-4 md:p-8 flex items-center justify-center">
        <div id="previewContainer" class="w-full h-full max-w-7xl mx-auto relative shadow-2xl rounded-2xl overflow-hidden border border-slate-800/50">
            <iframe id="view"></iframe>
            
            <!-- Empty State -->
            <div id="empty" class="absolute inset-0 flex flex-col items-center justify-center bg-[#020617] text-center p-10">
                <div class="relative mb-8">
                    <div class="absolute inset-0 bg-indigo-600 blur-[80px] opacity-20"></div>
                    <div class="w-24 h-24 bg-indigo-600/10 rounded-[2rem] flex items-center justify-center border border-indigo-500/20 relative z-10">
                        <i class="fas fa-rocket text-4xl text-indigo-500"></i>
                    </div>
                </div>
                <h2 class="text-2xl font-black mb-3 tracking-tight">Kavrix <span class="text-indigo-500">Enterprise</span></h2>
                <p class="text-slate-500 text-sm max-w-sm leading-relaxed">Je eigen white-label app builder. Klik op de magic wand om je eerste applicatie te genereren.</p>
            </div>
        </div>
    </main>

    <script>
        let currentCode = "";
        let currentProjectId = localStorage.getItem('kavrix_project_id') || null;
        const RENDER_URL = "https://kavrix.onrender.com"; // JOUW RENDER URL

        const sidebar = document.getElementById("sidebar");
        const view = document.getElementById("view");
        const empty = document.getElementById("empty");
        const loader = document.getElementById("loader");
        const statusBox = document.getElementById("statusBox");

        document.getElementById("menuBtn").onclick = () => sidebar.classList.remove("sidebar-closed");
        document.getElementById("closeBtn").onclick = () => sidebar.classList.add("sidebar-closed");

        async function loadProject() {
            if(!currentProjectId) return;
            try {
                const r = await fetch(`${RENDER_URL}/project/${currentProjectId}`);
                const d = await r.json();
                if(d.code) {
                    currentCode = d.code;
                    view.srcdoc = currentCode;
                    empty.style.display = "none";
                    statusBox.classList.remove("hidden");
                    document.getElementById("projectTitle").innerText = `"${d.name || 'Mijn App'}"`;
                }
            } catch(e) { console.log("Geen project gevonden"); }
        }
        loadProject();

        async function askAI() {
            const p = document.getElementById("prompt").value;
            if(!p) return;

            loader.style.display = "block";
            sidebar.classList.add("sidebar-closed");
            
            try {
                const r = await fetch(`${RENDER_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        prompt: p, 
                        existingCode: currentCode,
                        projectId: currentProjectId 
                    })
                });
                const d = await r.json();
                if(d.code) {
                    currentCode = d.code;
                    currentProjectId = d.projectId;
                    localStorage.setItem('kavrix_project_id', currentProjectId);
                    view.srcdoc = currentCode;
                    empty.style.display = "none";
                    statusBox.classList.remove("hidden");
                    document.getElementById("projectTitle").innerText = `"${p.substring(0, 30)}..."`;
                    document.getElementById("prompt").value = "";
                } else { alert("Fout: " + d.error); }
            } catch(e) { alert("Verbinding met server mislukt."); }
            finally { loader.style.display = "none"; }
        }

        document.getElementById("go").onclick = askAI;
        document.getElementById("reset").onclick = () => { 
            if(confirm("Project volledig wissen?")) {
                localStorage.removeItem('kavrix_project_id'); 
                location.reload(); 
            }
        };
        document.getElementById("dl").onclick = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([currentCode], {type:'text/html'}));
            a.download = 'kavrix-app.html'; a.click();
        };
    </script>
</body>
</html>
