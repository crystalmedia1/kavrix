<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVRIX PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        iframe { background: white; width: 100%; height: 100%; border: none; border-radius: 12px; }
        .sidebar { width: 260px; background: #0f172a; border-right: 1px solid rgba(255,255,255,0.1); display: none; }
        @media (min-width: 768px) { .sidebar { display: flex; flex-direction: column; } }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="h-16 glass flex items-center justify-between px-6 shrink-0">
        <h1 class="font-black text-xl tracking-tighter italic">KAVRIX <span class="text-indigo-500">PRO</span></h1>
        <div class="flex gap-2">
            <button onclick="copyCode()" class="px-4 py-2 bg-white/5 rounded-lg text-[10px] font-bold uppercase">Copy</button>
            <button onclick="location.reload()" class="px-4 py-2 bg-indigo-600 rounded-lg text-[10px] font-bold uppercase">Nieuw</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="sidebar p-4">
            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Projecten</div>
            <div id="projectList" class="flex-1 overflow-y-auto"></div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col p-4 gap-4">
            <div class="flex-1 bg-white/5 rounded-xl overflow-hidden p-1">
                <iframe id="preview"></iframe>
            </div>

            <!-- INPUT -->
            <div class="max-w-3xl mx-auto w-full bg-white/5 p-2 rounded-xl flex items-center gap-2 border border-white/10">
                <input id="prompt" type="text" placeholder="Wat gaan we bouwen?" class="flex-1 bg-transparent border-none outline-none p-3 text-sm">
                <button onclick="run()" class="w-12 h-12 bg-indigo-600 rounded-lg flex items-center justify-center hover:bg-indigo-500 transition">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        const RENDER_URL = "https://kavrix.onrender.com";
        let currentId = null;
        let currentCode = "";

        // Gebruiker ID
        let userId = localStorage.getItem('kavrix_user_id') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('kavrix_user_id', userId);

        // Start scherm
        window.onload = () => {
            document.getElementById("preview").srcdoc = "<body style='background:#0f172a; display:flex; align-items:center; justify-content:center; color:white; font-family:sans-serif;'><h1>KAVRIX ENGINE READY</h1></body>";
            loadProjects();
        };

        async function loadProjects() {
            try {
                const r = await fetch(`${RENDER_URL}/projects/${userId}`);
                const data = await r.json();
                const list = document.getElementById("projectList");
                list.innerHTML = "";
                data.forEach(p => {
                    const div = document.createElement("div");
                    div.className = "p-3 mb-2 bg-white/5 rounded-lg text-[10px] cursor-pointer hover:bg-white/10";
                    div.innerText = p.name || "Project";
                    div.onclick = () => selectProject(p.id);
                    list.appendChild(div);
                });
            } catch(e) { console.log("Server offline"); }
        }

        async function run() {
            const p = document.getElementById("prompt").value;
            if (!p) return;
            try {
                const r = await fetch(`${RENDER_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: p, userId: userId })
                });
                const d = await r.json();
                alert("Genereren gestart... even geduld.");
                startPolling(d.projectId);
            } catch(e) { alert("Fout: " + e); }
        }

        function startPolling(id) {
            const interval = setInterval(async () => {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                if (d.code !== "GENERATING") {
                    clearInterval(interval);
                    document.getElementById("preview").srcdoc = d.code;
                    currentCode = d.code;
                    loadProjects();
                }
            }, 3000);
        }

        async function selectProject(id) {
            const r = await fetch(`${RENDER_URL}/project/${id}`);
            const d = await r.json();
            document.getElementById("preview").srcdoc = d.code;
            currentCode = d.code;
        }

        function copyCode() {
            navigator.clipboard.writeText(currentCode);
            alert("Gekopieerd!");
        }
    </script>
</body>
</html>
