<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX | DeepAgent Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .loader-line { height: 3px; width: 0%; background: linear-gradient(to right, #6366f1, #a855f7); transition: 0.5s; position: fixed; top: 0; left: 0; z-index: 1000; }
        
        /* Verbeterde Command Bar Positie */
        .command-center {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            z-index: 100;
        }

        .sidebar-btn { transition: 0.2s; border-radius: 12px; border: 1px solid transparent; }
        .sidebar-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        .active-project { background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.3); color: #818cf8; }
        
        /* Zorg dat main content niet achter de bar valt */
        main { padding-bottom: 120px !important; }
    </style>
</head>
<body class="flex h-screen">

    <div id="loaderLine" class="loader-line"></div>

    <!-- Sidebar -->
    <aside class="w-64 md:w-80 glass border-r border-white/5 flex flex-col p-6 shrink-0">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i class="fas fa-brain text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter leading-none">KAVRIX</h1>
                <span class="text-[9px] text-indigo-400 font-bold uppercase tracking-widest">DeepAgent v5.1</span>
            </div>
        </div>

        <button onclick="newProject()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest mb-8 hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/20">
            + Nieuw Project
        </button>

        <div class="flex-1 overflow-y-auto space-y-2 pr-2" id="projectList">
            <!-- Projecten laden hier -->
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col p-4 md:p-8 relative overflow-hidden">
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-[#020617]">
            <div class="w-20 h-20 bg-slate-900 rounded-[28px] flex items-center justify-center mb-6 border border-white/5">
                <i class="fas fa-wand-magic-sparkles text-3xl text-indigo-500"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 tracking-tight">Wat gaan we bouwen?</h2>
            <p class="text-slate-500 text-xs max-w-xs text-center leading-relaxed">Typ je opdracht hieronder om te beginnen.</p>
        </div>

        <div class="flex-1 relative z-0 h-full">
            <iframe id="preview" class="hidden"></iframe>
        </div>

        <!-- Command Center (Zwevend onderaan) -->
        <div class="command-center">
            <div class="glass rounded-[24px] p-2 flex items-center shadow-2xl border border-white/10">
                <div class="w-10 h-10 flex items-center justify-center text-slate-500 hidden md:flex">
                    <i class="fas fa-terminal text-[10px]"></i>
                </div>
                <input id="prompt" type="text" class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-sm font-medium placeholder:text-slate-600 text-white" placeholder="Beschrijf je app...">
                <button id="go" class="bg-indigo-600 px-6 md:px-8 py-3 rounded-[18px] font-black text-[10px] uppercase tracking-widest flex items-center gap-2 hover:bg-indigo-500 transition-all active:scale-95">
                    <span class="hidden md:inline">Genereer</span>
                    <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const RENDER_URL = "https://kavrix.onrender.com";
        let currentId = localStorage.getItem('kavrix_id');
        let pollInterval = null;

        async function loadProjects() {
            try {
                const r = await fetch(`${RENDER_URL}/projects`);
                const data = await r.json();
                const list = document.getElementById("projectList");
                list.innerHTML = "";
                data.forEach(p => {
                    const div = document.createElement("div");
                    div.className = `sidebar-btn p-4 flex justify-between items-center group ${currentId === p.id ? 'active-project' : ''}`;
                    div.innerHTML = `
                        <button class="flex-1 text-left text-[10px] font-bold truncate pr-2 uppercase tracking-wider">${p.name || 'Naamloos'}</button>
                        <button onclick="deleteProject('${p.id}', event)" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500 transition-all">
                            <i class="fas fa-trash-alt text-[10px]"></i>
                        </button>
                    `;
                    div.querySelector('button').onclick = () => selectProject(p.id);
                    list.appendChild(div);
                });
            } catch(e) { console.error("Laden mislukt"); }
        }

        async function selectProject(id) {
            currentId = id;
            localStorage.setItem('kavrix_id', id);
            document.getElementById("loaderLine").style.width = "30%";
            try {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                
                if (d.code === "GENERATING") {
                    startPolling(id);
                } else {
                    stopPolling();
                    const iframe = document.getElementById("preview");
                    iframe.srcdoc = d.code;
                    iframe.classList.remove("hidden");
                    document.getElementById("emptyState").classList.add("hidden");
                    loadProjects();
                }
            } catch(e) { console.error(e); }
        }

        function startPolling(id) {
            document.getElementById("loaderLine").style.width = "60%";
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                if (d.code !== "GENERATING") {
                    selectProject(id);
                }
            }, 3000);
        }

        function stopPolling() {
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById("loaderLine").style.width = "100%";
            setTimeout(() => document.getElementById("loaderLine").style.width = "0%", 600);
        }

        async function run() {
            const p = document.getElementById("prompt").value;
            if (!p) return;
            
            document.getElementById("loaderLine").style.width = "20%";
            try {
                const r = await fetch(`${RENDER_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: p, projectId: currentId })
                });
                const d = await r.json();
                startPolling(d.projectId);
                document.getElementById("prompt").value = "";
            } catch(e) { alert("Fout bij genereren"); }
        }

        async function deleteProject(id, e) {
            e.stopPropagation();
            if(!confirm("Project verwijderen?")) return;
            await fetch(`${RENDER_URL}/delete-project/${id}`, { method: "DELETE" });
            if(currentId === id) newProject();
            else loadProjects();
        }

        function newProject() {
            currentId = null;
            localStorage.removeItem('kavrix_id');
            location.reload();
        }

        document.getElementById("go").onclick = run;
        document.getElementById("prompt").onkeydown = (e) => { if(e.key === 'Enter') run(); };
        
        if(currentId) selectProject(currentId);
        loadProjects();
    </script>
</body>
</html>
