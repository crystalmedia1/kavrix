<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX | AI App Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar { transition: transform 0.3s ease; z-index: 50; }
        .project-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; cursor: pointer; padding: 12px; border-radius: 8px; margin-bottom: 8px; }
        .project-card:hover { background: rgba(255,255,255,0.08); border-color: #6366f1; }
        .project-card.active { background: #6366f1; border-color: #818cf8; }
        iframe { background: white; border-radius: 12px; width: 100%; height: 100%; border: none; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: #0f172a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        .logo-anim { font-size: 3rem; font-weight: 900; letter-spacing: -2px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
        
        .hidden-sidebar { transform: translateX(-100%); }
        @media (min-width: 768px) { .hidden-sidebar { transform: translateX(0); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- SPLASH SCREEN -->
    <div id="splash">
        <div class="logo-anim text-indigo-500">KAVRIX</div>
        <div class="mt-4 text-slate-500 text-xs tracking-[0.3em] uppercase">Initializing AI Engine...</div>
    </div>

    <!-- HEADER -->
    <header class="h-16 glass flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-white/10 rounded-lg"><i class="fas fa-bars"></i></button>
            <h1 class="font-black tracking-tighter text-xl">KAVRIX <span class="text-indigo-500 text-xs ml-1">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="copyCode()" class="px-4 py-2 glass rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-white/10">Copy</button>
            <button onclick="newProject()" class="px-4 py-2 bg-indigo-600 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-indigo-500">New</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar absolute md:relative w-72 h-full glass border-t-0 border-l-0 hidden-sidebar flex flex-col">
            <div class="p-4 font-bold text-[10px] uppercase tracking-widest text-slate-500">Mijn Projecten</div>
            <div id="projectList" class="flex-1 overflow-y-auto px-3 custom-scrollbar"></div>
            
            <div class="p-4 border-t border-white/5">
                <div class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-3">App Store Templates</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="useTemplate('Webshop')" class="p-2 glass rounded text-[9px] font-bold hover:bg-indigo-600 transition">WEBSHOP</button>
                    <button onclick="useTemplate('Dashboard')" class="p-2 glass rounded text-[9px] font-bold hover:bg-indigo-600 transition">DASHBOARD</button>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col p-4 gap-4 relative">
            <div id="loaderLine" class="absolute top-0 left-0 h-1 bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
            
            <div class="flex-1 glass rounded-xl overflow-hidden relative">
                <iframe id="preview" srcdoc="<body style='background:#0f172a; display:flex; align-items:center; justify-content:center; color:white; font-family:sans-serif;'><h1>KAVRIX READY</h1></body>"></iframe>
            </div>

            <!-- INPUT AREA -->
            <div class="glass p-2 rounded-2xl flex items-center gap-2">
                <input id="prompt" type="text" placeholder="Wat gaan we bouwen?" class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-sm">
                <button onclick="run()" class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center hover:bg-indigo-500 transition shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        const RENDER_URL = "https://kavrix.onrender.com";
        let currentId = null;
        let currentCode = "";
        let pollInterval = null;

        // USER SESSION LOGICA
        let userId = localStorage.getItem('kavrix_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('kavrix_user_id', userId);
        }

        // SPLASH SCREEN LOGICA
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').remove(), 800);
                loadProjects();
            }, 2000);
        };

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("hidden-sidebar");
        }

        async function loadProjects() {
            try {
                const r = await fetch(`${RENDER_URL}/projects/${userId}`);
                const data = await r.json();
                const list = document.getElementById("projectList");
                list.innerHTML = "";
                data.forEach(p => {
                    const card = document.createElement("div");
                    card.className = `project-card ${currentId === p.id ? 'active' : ''}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black uppercase tracking-wider truncate pr-2">${p.name || 'Project'}</span>
                            <button onclick="deleteProject('${p.id}', event)" class="text-white/30 hover:text-white"><i class="fas fa-times text-[10px]"></i></button>
                        </div>
                    `;
                    card.onclick = () => { selectProject(p.id); if(window.innerWidth < 768) toggleSidebar(); };
                    list.appendChild(card);
                });
            } catch(e) {}
        }

        async function run() {
            const p = document.getElementById("prompt").value;
            if (!p) return;
            document.getElementById("loaderLine").style.width = "30%";
            try {
                const r = await fetch(`${RENDER_URL}/generate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: p, projectId: currentId, userId: userId })
                });
                const d = await r.json();
                currentId = d.projectId;
                startPolling(d.projectId);
                document.getElementById("prompt").value = "";
            } catch(e) { alert("Fout bij genereren"); }
        }

        function startPolling(id) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                const r = await fetch(`${RENDER_URL}/project/${id}`);
                const d = await r.json();
                if (d.code !== "GENERATING") {
                    clearInterval(pollInterval);
                    currentCode = d.code;
                    document.getElementById("preview").srcdoc = d.code;
                    document.getElementById("loaderLine").style.width = "100%";
                    setTimeout(() => document.getElementById("loaderLine").style.width = "0%", 1000);
                    loadProjects();
                }
            }, 3000);
        }

        async function selectProject(id) {
            currentId = id;
            const r = await fetch(`${RENDER_URL}/project/${id}`);
            const d = await r.json();
            currentCode = d.code;
            document.getElementById("preview").srcdoc = d.code;
            loadProjects();
        }

        function newProject() {
            currentId = null;
            currentCode = "";
            document.getElementById("preview").srcdoc = "<body style='background:#0f172a; display:flex; align-items:center; justify-content:center; color:white; font-family:sans-serif;'><h1>NIEUW PROJECT</h1></body>";
            loadProjects();
        }

        async function deleteProject(id, e) {
            e.stopPropagation();
            if (!confirm("Verwijderen?")) return;
            await fetch(`${RENDER_URL}/delete-project/${id}`, { method: "DELETE" });
            if (currentId === id) newProject();
            loadProjects();
        }

        function useTemplate(type) {
            document.getElementById("prompt").value = `Maak een luxe ${type} app met dummy data en iconen.`;
            run();
        }

        function copyCode() {
            navigator.clipboard.writeText(currentCode);
            alert("Code gekopieerd!");
        }
    </script>
</body>
</html>
