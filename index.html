<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kavrix AI | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #sidebar { transition: all 0.3s ease; z-index: 100; }
        .sidebar-closed { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .glass-menu { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans overflow-hidden">

    <!-- Top Bar -->
    <div class="h-16 border-b border-slate-800 flex items-center justify-between px-4 bg-[#0f172a] z-50 relative">
        <div class="flex items-center gap-2">
            <button id="menuToggle" class="w-10 h-10 flex items-center justify-center bg-indigo-600 rounded-lg">
                <i class="fas fa-bars text-white"></i>
            </button>
            <h1 class="text-lg font-black tracking-tighter">KAVRIX <span class="text-cyan-400">AI</span></h1>
        </div>
        <button id="resetBtn" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-400">
            <i class="fas fa-trash-alt"></i>
        </button>
    </div>

    <div class="flex h-[calc(100vh-64px)] relative">
        <!-- Sidebar Overlay -->
        <div id="sidebar" class="absolute inset-0 glass-menu p-6 space-y-6 sidebar-closed">
            <div class="space-y-4">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Nieuw Project</label>
                <textarea id="promptInput" class="w-full h-24 bg-[#020617] border border-slate-700 rounded-xl p-4 text-sm outline-none" placeholder="Beschrijf je app..."></textarea>
                <button id="buildBtn" class="w-full bg-indigo-600 py-3 rounded-xl font-bold text-sm">BOUW APP</button>
            </div>

            <div id="editSection" class="space-y-4 opacity-40 pointer-events-none">
                <label class="text-[10px] font-bold text-purple-400 uppercase tracking-widest">Aanpassen & Chat</label>
                <textarea id="editInput" class="w-full h-24 bg-[#020617] border border-slate-700 rounded-xl p-4 text-sm outline-none" placeholder="Wat moet er anders?"></textarea>
                <button id="editBtn" class="w-full bg-purple-600 py-3 rounded-xl font-bold text-sm">PAS AAN</button>
            </div>

            <div id="statusArea" class="hidden text-center p-4 bg-slate-900 rounded-xl border border-slate-800">
                <i class="fas fa-sync-alt fa-spin text-cyan-400 mr-2"></i>
                <span class="text-xs text-cyan-400 font-bold uppercase">Architect werkt...</span>
            </div>
        </div>

        <!-- Preview Area -->
        <div class="flex-1 bg-[#020617] p-2">
            <iframe id="previewFrame" class="w-full h-full border-none rounded-2xl bg-white shadow-2xl"></iframe>
        </div>
    </div>

    <script>
        let currentCode = localStorage.getItem('kavrix_last_code') || "";
        const sidebar = document.getElementById("sidebar");
        
        document.getElementById("menuToggle").addEventListener("click", () => sidebar.classList.toggle("sidebar-closed"));

        if(currentCode) {
            document.getElementById("previewFrame").srcdoc = currentCode;
            document.getElementById("editSection").classList.remove("opacity-40", "pointer-events-none");
        }

        async function callAI(prompt, isEdit = false) {
            const btn = isEdit ? document.getElementById("editBtn") : document.getElementById("buildBtn");
            const statusArea = document.getElementById("statusArea");
            btn.disabled = true;
            statusArea.classList.remove("hidden");

            try {
                const response = await fetch("https://kavrix.onrender.com/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt, existingCode: isEdit ? currentCode : "" })
                });

                const data = await response.json();
                if (data.code) {
                    currentCode = data.code;
                    localStorage.setItem('kavrix_last_code', currentCode);
                    document.getElementById("previewFrame").srcdoc = data.code;
                    document.getElementById("editSection").classList.remove("opacity-40", "pointer-events-none");
                    sidebar.classList.add("sidebar-closed");
                }
            } catch (e) { alert("Fout!"); }
            finally { btn.disabled = false; statusArea.classList.add("hidden"); }
        }

        document.getElementById("buildBtn").addEventListener("click", () => {
            const p = document.getElementById("promptInput").value;
            if(p) callAI(p, false);
        });

        document.getElementById("editBtn").addEventListener("click", () => {
            const p = document.getElementById("editInput").value;
            if(p) callAI(p, true);
        });

        document.getElementById("resetBtn").addEventListener("click", () => {
            if(confirm("Project wissen?")) { localStorage.removeItem('kavrix_last_code'); location.reload(); }
        });
    </script>
</body>
</html>
