<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVRIX | Multi-File Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        iframe { background: white; border-radius: 20px; width: 100%; height: 100%; border: none; }
        #codePanel { position: fixed; right: -100%; top: 0; width: 45%; height: 100%; background: #020617; z-index: 50; transition: 0.4s; border-left: 1px solid #1e293b; display: flex; flex-direction: column; }
        #codePanel.open { right: 0; }
        .tab { padding: 10px 20px; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid transparent; color: #64748b; }
        .tab.active { color: #6366f1; border-color: #6366f1; background: rgba(99,102,241,0.05); }
        pre { flex: 1; overflow: auto; padding: 20px; font-family: monospace; font-size: 12px; color: #818cf8; }
    </style>
</head>
<body class="flex flex-col">

    <!-- CODE INSPECTOR MET TABBLADEN -->
    <div id="codePanel">
        <div class="flex bg-[#0f172a] border-bottom border-white/5">
            <div onclick="showTab('html')" id="tab-html" class="tab active">index.html</div>
            <div onclick="showTab('css')" id="tab-css" class="tab">style.css</div>
            <div onclick="showTab('js')" id="tab-js" class="tab">script.js</div>
            <button onclick="toggleCode()" class="ml-auto p-4 text-slate-500"><i class="fas fa-times"></i></button>
        </div>
        <pre id="codeDisplay"></pre>
    </div>

    <header class="h-20 glass flex items-center justify-between px-8 shrink-0">
        <h1 class="font-black text-2xl italic tracking-tighter">KAVRIX <span class="text-[10px] bg-indigo-500/20 px-2 py-1 rounded-full not-italic ml-2">MULTI-FILE</span></h1>
        <div class="flex gap-3">
            <button onclick="toggleCode()" class="px-5 py-2.5 glass rounded-xl text-[10px] font-bold uppercase">Inspect</button>
            <button onclick="location.reload()" class="px-5 py-2.5 bg-indigo-600 rounded-xl text-[10px] font-bold uppercase">New</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col p-6 gap-6 relative">
        <div id="loader" class="absolute top-0 left-0 h-1 bg-indigo-500 transition-all" style="width: 0%"></div>
        <div class="flex-1 glass rounded-[30px] overflow-hidden p-1">
            <iframe id="preview"></iframe>
        </div>
        <div class="max-w-3xl mx-auto w-full glass p-2 rounded-2xl flex items-center gap-3">
            <input id="prompt" type="text" placeholder="Wat gaan we bouwen?" class="flex-1 bg-transparent border-none outline-none p-4 text-sm font-medium text-white">
            <button onclick="run()" class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center hover:bg-indigo-500 transition">
                <i class="fas fa-bolt"></i>
            </button>
        </div>
    </main>

    <script>
        var RENDER_URL = "https://kavrix.onrender.com";
        var currentFiles = { html: "", css: "", js: "" };
        var activeTab = 'html';
        var userId = 'user_' + Math.random().toString(36).substr(2, 9);

        function toggleCode() { document.getElementById("codePanel").classList.toggle("open"); }

        function showTab(type) {
            activeTab = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + type).classList.add('active');
            document.getElementById('codeDisplay').innerText = currentFiles[type];
        }

        function run() {
            var p = document.getElementById("prompt").value;
            document.getElementById("loader").style.width = "50%";
            fetch(RENDER_URL + "/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: p, userId: userId })
            }).then(r => r.json()).then(d => startPolling(d.projectId));
        }

        function startPolling(id) {
            var interval = setInterval(() => {
                fetch(RENDER_URL + "/project/" + id).then(r => r.json()).then(d => {
                    if (d.files && d.files.html !== "GENERATING") {
                        clearInterval(interval);
                        currentFiles = d.files;
                        renderPreview();
                        showTab('html');
                        document.getElementById("loader").style.width = "100%";
                        setTimeout(() => document.getElementById("loader").style.width = "0%", 1000);
                    }
                });
            }, 3000);
        }

        function renderPreview() {
            var fullCode = `
                ${currentFiles.html}
                <style>${currentFiles.css}</style>
                <script>${currentFiles.js}<\/script>
            `;
            document.getElementById("preview").srcdoc = fullCode;
        }
    </script>
</body>
</html>
