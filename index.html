<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAVRIX | AI App Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; overflow: hidden; margin: 0; height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 40; background: #0f172a; border-right: 1px solid rgba(255,255,255,0.05); }
        .project-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; padding: 14px; border-radius: 14px; margin-bottom: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .project-card:hover { background: rgba(99, 102, 241, 0.1); border-color: #6366f1; color: white; transform: translateX(5px); }
        iframe { background: #f8fafc; border-radius: 24px; width: 100%; height: 100%; border: none; box-shadow: 0 25px 60px rgba(0,0,0,0.4); }
        #splash { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; cursor: pointer; }
        .logo-anim { font-size: 4rem; font-weight: 900; letter-spacing: -4px; animation: pulse 2s infinite; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }
        .hidden-sidebar { transform: translateX(-100%); }
        @media (min-width: 768px) { .hidden-sidebar { transform: translateX(0); } }
    </style>
</head>
<body class="flex flex-col">

    <div id="splash" onclick="hideSplash()">
        <div class="logo-anim">KAVRIX</div>
        <div class="mt-8 flex items-center gap-4">
            <div class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></div>
            <div class="w-2 h-2 bg-purple-500 rounded-full animate-ping [animation-delay:0.2s]"></div>
            <div class="w-2 h-2 bg-pink-500 rounded-full animate-ping [animation-delay:0.4s]"></div>
        </div>
        <div class="mt-6 text-slate-500 text-[9px] font-black tracking-[0.5em] uppercase opacity-50">Neural Engine Initializing</div>
    </div>

    <header class="h-20 glass flex items-center justify-between px-8 shrink-0 z-10">
        <div class="flex items-center gap-6">
            <button onclick="toggleSidebar()" class="p-3 hover:bg-white/10 rounded-2xl md:hidden transition"><i class="fas fa-align-left"></i></button>
            <h1 class="font-black tracking-tighter text-3xl italic">KAVRIX <span class="text-indigo-500 not-italic text-[10px] bg-indigo-500/20 border border-indigo-500/30 px-2.5 py-1 rounded-full ml-2 uppercase tracking-widest">Pro</span></h1>
        </div>
        <div class="flex gap-4">
            <button onclick="copyCode()" class="px-6 py-3 glass rounded-2xl text-[11px] font-black uppercase tracking-widest hover:bg-white/10 transition active:scale-95">Copy</button>
            <button onclick="newProject()" class="px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl text-[11px] font-black uppercase tracking-widest hover:shadow-[0_0_25px_rgba(99,102,241,0.4)] transition active:scale-95">New App</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <aside id="sidebar" class="sidebar absolute md:relative w-80 h-full hidden-sidebar flex flex-col shadow-2xl">
            <div class="p-8 font-black text-[11px] uppercase tracking-[0.3em] text-slate-500 flex justify-between items-center">
                <span>Library</span>
                <i class="fas fa-layer-group opacity-20"></i>
            </div>
            <div id="projectList" class="flex-1 overflow-y-auto px-6"></div>
        </aside>

        <main class="flex-1 flex flex-col p-4 md:p-8 gap-6 relative bg-[#0f172a]">
            <div id="loaderLine" class="absolute top-0 left-0 h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 transition-all duration-1000" style="width: 0%"></div>
            <div class="flex-1 glass rounded-[32px] overflow-hidden relative p-1.5 bg-white/5 shadow-inner">
                <iframe id="preview"></iframe>
            </div>
            <div class="max-w-4xl mx-auto w-full glass p-3 rounded-[24px] flex items-center gap-3 shadow-2xl border-white/10 mb-2">
                <div class="pl-4 text-indigo-500 animate-pulse"><i class="fas fa-wand-sparkles"></i></div>
                <input id="prompt" type="text" placeholder="Wat gaan we vandaag creëren?" class="flex-1 bg-transparent border-none outline-none px-2 py-4 text-sm font-semibold placeholder:text-slate-500 text-white">
                <button onclick="run()" class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center hover:bg-indigo-500 transition shadow-xl shadow-indigo-600/30 group">
                    <i class="fas fa-paper-plane group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        // VERGEET NIET JE EIGEN RENDER URL HIER TE ZETTEN
        var RENDER_URL = "https://kavrix.onrender.com"; 
        
        var currentCode = "";
        var userId = localStorage.getItem('kavrix_user_id') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('kavrix_user_id', userId);

        function hideSplash() {
            var s = document.getElementById('splash');
            if(s) {
                s.style.opacity = '0';
                setTimeout(function(){ s.remove(); }, 800);
            }
        }
        setTimeout(hideSplash, 4000);

        window.onload = function() {
            document.getElementById("preview").srcdoc = "<html><body style='background:radial-gradient(circle at top right, #1e293b, #0f172a); color:white; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; margin:0; text-align:center;'><div style='padding:40px; border-radius:30px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1);'><h1 style='font-size:32px; font-weight:900;'>KAVRIX READY</h1><p style='color:#94a3b8;'>Beschrijf je app hieronder om te beginnen.</p></div></body></html>";
            loadProjects();
        };

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("hidden-sidebar");
        }

        function loadProjects() {
            fetch(RENDER_URL + "/projects/" + userId)
                .then(function(r){ return r.json(); })
                .then(function(data){
                    var list = document.getElementById("projectList");
                    list.innerHTML = "";
                    data.forEach(function(p){
                        var card = document.createElement("div");
                        card.className = "project-card";
                        card.innerText = p.name || 'Untitled App';
                        card.onclick = function(){ selectProject(p.id); };
                        list.appendChild(card);
                    });
                }).catch(function(e){});
        }

        function run() {
            var p = document.getElementById("prompt").value;
            if (!p) return;
            document.getElementById("loaderLine").style.width = "40%";
            
            fetch(RENDER_URL + "/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: p, userId: userId })
            })
            .then(function(r){ return r.json(); })
            .then(function(d){
                startPolling(d.projectId);
                document.getElementById("prompt").value = "";
            })
            .catch(function(e){ 
                alert("Server verbinding mislukt."); 
                document.getElementById("loaderLine").style.width = "0%";
            });
        }

        function startPolling(id) {
            var interval = setInterval(function(){
                fetch(RENDER_URL + "/project/" + id)
                    .then(function(r){ return r.json(); })
                    .then(function(d){
                        if (d.code !== "GENERATING") {
                            clearInterval(interval);
                            document.getElementById("preview").srcdoc = d.code;
                            currentCode = d.code;
                            document.getElementById("loaderLine").style.width = "100%";
                            setTimeout(function(){ document.getElementById("loaderLine").style.width = "0%"; }, 1000);
                            loadProjects();
                        }
                    }).catch(function(e){});
            }, 3000);
        }

        function selectProject(id) {
            document.getElementById("loaderLine").style.width = "100%";
            fetch(RENDER_URL + "/project/" + id)
                .then(function(r){ return r.json(); })
                .then(function(d){
                    document.getElementById("preview").srcdoc = d.code;
                    currentCode = d.code;
                    setTimeout(function(){ document.getElementById("loaderLine").style.width = "0%"; }, 500);
                });
        }

        function newProject() { location.reload(); }
        function copyCode() { 
            var dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = currentCode;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);
            alert("Code gekopieerd!"); 
        }
    </script>
</body>
</html>
