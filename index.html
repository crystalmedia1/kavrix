<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVRIX | DeepAgent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        #sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; background: #0f172a; border-right: 1px solid #1e293b; }
        .sidebar-closed { transform: translateX(-100%); }
        .project-card { background: #1e293b; border: 1px solid #334155; transition: 0.3s; cursor: pointer; }
        .project-card:hover { border-color: #6366f1; background: #1e1b4b; }
        iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 12px; }
    </style>
</head>
<body>
    <!-- Floating Menu Button -->
    <button id="menuBtn" class="fixed top-6 left-6 w-14 h-14 bg-indigo-600 text-white rounded-2xl z-[250] shadow-xl flex items-center justify-center hover:bg-indigo-500 transition-all">
        <i class="fas fa-bars text-xl"></i>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-full md:w-[400px] h-full p-8 flex flex-col sidebar-closed">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black italic">KAVRIX <span class="text-indigo-500 text-sm">DASHBOARD</span></h1>
            <button id="closeBtn" class="text-slate-400 hover:text-white text-2xl">&times;</button>
        </div>

        <div class="flex-1 overflow-y-auto space-y-6 pr-2">
            <!-- New Project Section -->
            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">Nieuwe Opdracht</label>
                <textarea id="prompt" class="w-full h-32 bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-indigo-500 text-sm resize-none" placeholder="Wat gaan we bouwen?"></textarea>
                <button id="go" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-black text-sm transition-all">START AGENT</button>
            </div>

            <!-- Projects List -->
            <div class="pt-6 border-t border-slate-800">
                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4 block">Mijn Projecten</label>
                <div id="projectList" class="space-y-3">
                    <!-- Projecten komen hier -->
                </div>
            </div>
        </div>
    </aside>

    <!-- Main View -->
    <main class="h-full w-full p-4 md:p-8">
        <iframe id="view" class="hidden"></iframe>
        <div id="empty" class="h-full w-full flex flex-col items-center justify-center text-center">
            <h2 class="text-xl font-bold mb-2">Welkom bij Kavrix DeepAgent</h2>
            <p class="text-slate-500 text-sm">Selecteer een project of start een nieuwe opdracht.</p>
        </div>
    </main>

    <script>
        const RENDER_URL = "https://kavrix.onrender.com";
        let currentProjectId = null;

        async function loadProjects() {
            const r = await fetch(`${RENDER_URL}/projects`);
            const projects = await r.json();
            const list = document.getElementById("projectList");
            list.innerHTML = "";
            projects.forEach(p => {
                const div = document.createElement("div");
                div.className = "project-card p-4 rounded-xl text-xs font-medium";
                div.innerText = p.name || "Naamloos Project";
                div.onclick = () => loadProject(p.id);
                list.appendChild(div);
            });
        }

        async function loadProject(id) {
            currentProjectId = id;
            const r = await fetch(`${RENDER_URL}/project/${id}`);
            const d = await r.json();
            const view = document.getElementById("view");
            view.srcdoc = d.code;
            view.classList.remove("hidden");
            document.getElementById("empty").classList.add("hidden");
            document.getElementById("sidebar").classList.add("sidebar-closed");
        }

        async function askAgent() {
            const p = document.getElementById("prompt").value;
            if(!p) return;
            document.getElementById("sidebar").classList.add("sidebar-closed");
            
            const r = await fetch(`${RENDER_URL}/generate`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: p, projectId: currentProjectId })
            });
            const d = await r.json();
            loadProject(d.projectId);
            loadProjects();
        }

        document.getElementById("go").onclick = askAgent;
        document.getElementById("menuBtn").onclick = () => { loadProjects(); document.getElementById("sidebar").classList.remove("sidebar-closed"); };
        document.getElementById("closeBtn").onclick = () => document.getElementById("sidebar").classList.add("sidebar-closed");
        
        loadProjects();
    </script>
</body>
</html>
