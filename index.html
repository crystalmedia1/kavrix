<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVRIX | AI App Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar { width: 300px; transition: all 0.3s ease; }
        .preview-container { height: calc(100vh - 180px); border-radius: 24px; overflow: hidden; background: #1e293b; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen">

    <!-- SIDEBAR -->
    <aside class="sidebar glass h-full flex flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i data-lucide="zap" class="text-white"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">KAVRIX</h1>
        </div>

        <div class="flex-1 overflow-y-auto space-y-4" id="projectList">
            <p class="text-slate-400 text-sm uppercase tracking-widest font-semibold mb-2">Mijn Projecten</p>
            <!-- Projecten worden hier geladen -->
            <div class="text-center py-10 text-slate-500 italic text-sm">Geen projecten gevonden...</div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/10">
            <button onclick="window.location.reload()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 transition">
                <i data-lucide="plus-circle"></i> Nieuw Project
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col p-8 relative">
        
        <!-- PREVIEW AREA -->
        <div class="preview-container glass shadow-2xl relative">
            <div id="loadingOverlay" class="absolute inset-0 bg-slate-900/80 flex flex-col items-center justify-center z-10 hidden">
                <div class="loader mb-4"></div>
                <p class="text-indigo-400 font-medium animate-pulse">KAVRIX bouwt je app...</p>
            </div>
            <iframe id="previewFrame" srcdoc="<body style='background:#1e293b; display:flex; align-items:center; justify-content:center; color:#64748b; font-family:sans-serif;'><h1>Typ je idee hieronder om te beginnen</h1></body>"></iframe>
        </div>

        <!-- INPUT AREA -->
        <div class="mt-8 max-w-4xl mx-auto w-full relative">
            <div class="glass p-2 rounded-3xl flex items-center gap-2 shadow-2xl border-indigo-500/20">
                <input type="text" id="promptInput" placeholder="Beschrijf je app (bijv. 'Live Crypto Dashboard')..." 
                       class="flex-1 bg-transparent border-none outline-none px-6 py-4 text-lg placeholder:text-slate-500">
                <button onclick="generateApp()" id="genBtn" class="bg-indigo-600 hover:bg-indigo-500 p-4 rounded-2xl transition shadow-lg shadow-indigo-600/20">
                    <i data-lucide="sparkles"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://kavrix.onrender.com"; // VERVANG DIT DOOR JE EIGEN RENDER URL
        const USER_ID = "user_123"; // Voor nu statisch, later voor inloggen
        let currentProjectId = null;

        // INITIALISEER ICONS
        lucide.createIcons();

        // LAAD PROJECTEN BIJ OPSTARTEN
        async function loadProjects() {
            try {
                const res = await fetch(`${API_URL}/projects/${USER_ID}`);
                const projects = await res.json();
                const list = document.getElementById('projectList');
                
                if (projects.length === 0) return;

                list.innerHTML = '<p class="text-slate-400 text-sm uppercase tracking-widest font-semibold mb-2">Mijn Projecten</p>';
                projects.forEach(p => {
                    const div = document.createElement('div');
                    div.className = "group flex items-center justify-between p-3 rounded-xl hover:bg-white/5 transition cursor-pointer border border-transparent hover:border-white/10";
                    div.innerHTML = `
                        <div class="flex items-center gap-3 flex-1" onclick="openProject('${p.id}')">
                            <i data-lucide="file-code" class="text-indigo-400 w-4 h-4"></i>
                            <span class="text-sm font-medium truncate w-32">${p.name}</span>
                        </div>
                        <button onclick="deleteProject('${p.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    `;
                    list.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) { console.error("Fout bij laden projecten"); }
        }

        async function generateApp() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;

            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('genBtn').disabled = true;

            try {
                const res = await fetch(`${API_URL}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, userId: USER_ID })
                });
                const data = await res.json();
                currentProjectId = data.projectId;
                checkStatus();
            } catch (e) { alert("Fout bij verbinden met server"); }
        }

        async function checkStatus() {
            const res = await fetch(`${API_URL}/project/${currentProjectId}`);
            const data = await res.json();

            if (data.files && data.files.html !== "GENERATING") {
                renderApp(data.files);
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('genBtn').disabled = false;
                loadProjects(); // Ververs de lijst
            } else {
                setTimeout(checkStatus, 3000);
            }
        }

        function renderApp(files) {
            const frame = document.getElementById('previewFrame');
            const fullCode = `
                ${files.html}
                <style>${files.css}</style>
                <script>${files.js}<\/script>
            `;
            frame.srcdoc = fullCode;
        }

        async function openProject(id) {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const res = await fetch(`${API_URL}/project/${id}`);
            const data = await res.json();
            renderApp(data.files);
            currentProjectId = id;
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        // VERWIJDER FUNCTIE (Moet nog in server.js worden toegevoegd)
        async function deleteProject(id) {
            if(!confirm("Weet je zeker dat je dit project wilt verwijderen?")) return;
            // Voor nu halen we het alleen uit de UI, we voegen de backend delete later toe
            loadProjects();
        }

        loadProjects();
    </script>
</body>
</html>
