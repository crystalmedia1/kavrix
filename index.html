<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kavrix AI | Mobile Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 768px) {
            .sidebar-closed { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans overflow-hidden">
    <!-- Mobile Toggle -->
    <button id="menuToggle" class="fixed top-4 right-4 z-50 bg-indigo-600 p-3 rounded-full shadow-lg md:hidden">
        <i class="fas fa-bars text-white"></i>
    </button>

    <div class="flex h-screen relative">
        <!-- Sidebar -->
        <div id="sidebar" class="fixed md:relative w-full md:w-[400px] h-full bg-[#0f172a] border-r border-slate-800 flex flex-col z-40 sidebar-closed md:transform-none">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">
                        <i class="fas fa-microchip text-white"></i>
                    </div>
                    <h1 class="text-xl font-black text-white">KAVRIX <span class="text-cyan-400">AI</span></h1>
                </div>
                <button id="resetBtn" class="text-slate-500 p-2"><i class="fas fa-undo-alt"></i></button>
            </div>
            
            <div class="flex-1 p-5 overflow-y-auto space-y-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Nieuw Project</label>
                    <textarea id="promptInput" class="w-full h-32 bg-[#020617] border border-slate-700 rounded-xl p-4 text-white text-sm outline-none focus:border-indigo-500" placeholder="Beschrijf je app..."></textarea>
                    <button id="buildBtn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold text-sm">BOUW APP</button>
                </div>

                <div id="editSection" class="space-y-3 opacity-40 pointer-events-none">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-purple-400">Aanpassen</label>
                    <textarea id="editInput" class="w-full h-24 bg-[#020617] border border-slate-700 rounded-xl p-4 text-white text-sm outline-none focus:border-purple-500" placeholder="Wat moet er anders?"></textarea>
                    <button id="editBtn" class="w-full bg-purple-600 py-3 rounded-xl font-bold text-sm">PAS AAN</button>
                </div>

                <div id="statusArea" class="hidden p-4 bg-slate-900 rounded-xl border border-slate-800 text-center">
                    <i class="fas fa-sync-alt fa-spin text-cyan-400 mr-2"></i>
                    <span id="statusText" class="text-xs text-cyan-400">Bezig...</span>
                </div>
            </div>
        </div>

        <!-- Preview Area -->
        <div class="flex-1 flex flex-col bg-[#020617] w-full">
            <div class="flex-1 relative">
                <iframe id="previewFrame" class="w-full h-full border-none bg-white"></iframe>
                <div id="emptyState" class="absolute inset-0 flex items-center justify-center bg-[#020617] text-slate-700 text-[10px] uppercase tracking-[0.5em]">
                    Kavrix Mobile v4.3
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCode = localStorage.getItem('kavrix_last_code') || "";
        const sidebar = document.getElementById("sidebar");
        
        // Mobile Menu Logic
        document.getElementById("menuToggle").addEventListener("click", () => {
            sidebar.classList.toggle("sidebar-closed");
        });

        if(currentCode) {
            document.getElementById("previewFrame").srcdoc = currentCode;
            document.getElementById("emptyState").classList.add("hidden");
            document.getElementById("editSection").classList.remove("opacity-40", "pointer-events-none");
        }

        async function callAI(prompt, isEdit = false) {
            const btn = isEdit ? document.getElementById("editBtn") : document.getElementById("buildBtn");
            const statusArea = document.getElementById("statusArea");
            const statusText = document.getElementById("statusText");

            btn.disabled = true;
            statusArea.classList.remove("hidden");
            statusText.innerText = "Architect werkt...";

            try {
                const response = await fetch("https://kavrix.onrender.com/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt, existingCode: isEdit ? currentCode : "" })
                });

                const data = await response.json();
                if (data.code) {
                    currentCode = data.code;
                    localStorage.setItem('kavrix_last_code', currentCode);
                    document.getElementById("previewFrame").srcdoc = data.code;
                    document.getElementById("editSection").classList.remove("opacity-40", "pointer-events-none");
                    document.getElementById("emptyState").classList.add("hidden");
                    if(window.innerWidth < 768) sidebar.classList.add("sidebar-closed");
                }
            } catch (e) { statusText.innerText = "Fout!"; }
            finally { btn.disabled = false; statusArea.classList.add("hidden"); }
        }

        document.getElementById("buildBtn").addEventListener("click", () => {
            const p = document.getElementById("promptInput").value;
            if(p) callAI(p, false);
        });

        document.getElementById("editBtn").addEventListener("click", () => {
            const p = document.getElementById("editInput").value;
            if(p) callAI(p, true);
        });

        document.getElementById("resetBtn").addEventListener("click", () => {
            if(confirm("Wissen?")) { localStorage.removeItem('kavrix_last_code'); location.reload(); }
        });
    </script>
</body>
</html>
