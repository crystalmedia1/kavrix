<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVRIX PRO | Custom AI Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #06080f; color: white; overflow: hidden; margin: 0; }
        
        .glass { background: rgba(15, 20, 35, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Dynamische Kleuren */
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        .border-accent { border-color: var(--accent); }
        .shadow-accent { box-shadow: 0 10px 30px -10px var(--accent-glow); }
        
        .sidebar { width: 280px; border-right: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: all 0.2s; cursor: pointer; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: var(--accent-glow); color: white; }
        
        .preview-container { flex: 1; background: #020408; display: flex; align-items: center; justify-content: center; padding: 30px; position: relative; }
        .device-frame { width: 100%; height: 100%; max-width: 1200px; background: #111827; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); border: 8px solid #1f2937; position: relative; }
        
        #authOverlay { position: fixed; inset: 0; z-index: 9999; background: #06080f; display: flex; align-items: center; justify-content: center; }
        
        /* Kleurenkiezer */
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; border: 2px solid rgba(255,255,255,0.1); }
        .color-dot:hover { transform: scale(1.3); }

        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen">

    <!-- AUTH OVERLAY -->
    <div id="authOverlay">
        <div class="glass p-10 rounded-[32px] w-full max-w-md shadow-2xl text-center border-white/5">
            <div class="w-20 h-20 bg-accent rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-accent">
                <i data-lucide="zap" class="text-white w-10 h-10 fill-current"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2 tracking-tight">KAVRIX <span class="text-accent">PRO</span></h1>
            <p class="text-slate-400 text-sm mb-10" id="authSubtitle">Log in op je Enterprise Dashboard</p>
            <div class="space-y-4 text-left">
                <input type="email" id="email" placeholder="Email Adres" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-accent transition">
                <input type="password" id="password" placeholder="Wachtwoord" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-accent transition">
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-accent py-4 rounded-2xl font-bold hover:opacity-90 transition shadow-accent text-white">Inloggen</button>
                <p class="text-sm text-slate-500 text-center mt-6">
                    Nog geen account? <a href="#" onclick="toggleAuthMode()" class="text-accent font-semibold" id="toggleLink">Registreer hier</a>
                </p>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar glass flex flex-col p-6">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-accent">
                <i data-lucide="zap" class="text-white w-6 h-6 fill-current"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">KAVRIX <span class="text-accent">PRO</span></span>
        </div>

        <nav class="space-y-1 mb-8">
            <div class="nav-item active"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</div>
            <div class="nav-item" onclick="newProject()"><i data-lucide="plus-circle" class="w-5 h-5"></i> Nieuwe App</div>
            <div class="nav-item"><i data-lucide="settings" class="w-5 h-5"></i> Instellingen</div>
        </nav>

        <!-- KLEUREN KIEZER -->
        <div class="px-4 mb-8">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Thema Kleur</p>
            <div class="flex flex-wrap gap-2" id="colorPicker">
                <!-- Kleuren worden door JS gevuld -->
            </div>
        </div>

        <div class="flex-1 overflow-y-auto">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 px-4">Mijn Projecten</p>
            <div id="projectList" class="space-y-1"></div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center gap-3 p-3 text-slate-400 hover:text-white transition text-sm">
                <i data-lucide="log-out" class="w-4 h-4"></i> Uitloggen
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col">
        <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 glass">
            <div class="flex items-center gap-4">
                <h2 id="currentProjectName" class="text-sm font-semibold text-slate-300">Nieuw Project</h2>
                <span class="px-2 py-1 rounded bg-green-500/10 text-green-500 text-[10px] font-bold uppercase">Live Preview</span>
            </div>
            <div class="flex items-center gap-3">
                <button class="px-4 py-2 bg-accent rounded-xl text-xs font-bold transition shadow-accent text-white">Publiceren</button>
            </div>
        </header>

        <div class="preview-container">
            <div id="loadingOverlay" class="absolute inset-0 bg-[#06080f]/90 z-50 flex flex-col items-center justify-center hidden">
                <div class="loader mb-6"></div>
                <p class="text-accent font-bold tracking-widest animate-pulse">KAVRIX AI GENEREERT JE APP...</p>
            </div>
            <div class="device-frame">
                <iframe id="previewFrame" srcdoc="<body style='background:#111827; display:flex; align-items:center; justify-content:center; color:#4b5563; font-family:sans-serif; height:100vh; margin:0;'><h1>Beschrijf je app om te beginnen</h1></body>"></iframe>
            </div>
        </div>

        <div class="p-8 glass border-t border-white/5">
            <div class="max-w-4xl mx-auto relative">
                <div class="flex items-center gap-4 bg-white/5 p-2 rounded-[24px] border border-white/10 focus-within:border-accent transition-all shadow-2xl">
                    <div class="pl-4 text-accent"><i data-lucide="sparkles" class="w-6 h-6"></i></div>
                    <input type="text" id="promptInput" placeholder="Beschrijf je droom app..." class="flex-1 bg-transparent border-none outline-none py-4 text-sm text-white placeholder:text-slate-500">
                    <button onclick="generateApp()" id="genBtn" class="bg-accent p-4 rounded-2xl transition shadow-accent text-white">
                        <i data-lucide="zap" class="w-6 h-6 fill-current"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://kavrix.onrender.com";
        let userId = localStorage.getItem('kavrix_user_id');
        let token = localStorage.getItem('kavrix_token');
        let currentProjectId = null;
        let isLogin = true;
        let pollInterval = null;

        // Kleuren opties
        const themeColors = [
            '#6366f1', '#ef4444', '#f59e0b', '#10b981', '#3b82f6', 
            '#a855f7', '#ec4899', '#06b6d4', '#84cc16', '#f43f5e',
            '#14b8a6', '#fb923c', '#64748b', '#d946ef', '#fbbf24'
        ];

        function initColors() {
            const picker = document.getElementById('colorPicker');
            themeColors.forEach(color => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.backgroundColor = color;
                dot.onclick = () => changeTheme(color);
                picker.appendChild(dot);
            });
            const saved = localStorage.getItem('kavrix_theme');
            if(saved) changeTheme(saved);
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-glow', color + '4d');
            localStorage.setItem('kavrix_theme', color);
        }

        lucide.createIcons();
        initColors();

        if(userId && token) {
            document.getElementById('authOverlay').classList.add('hidden');
            loadProjects();
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('authBtn').innerText = isLogin ? 'Inloggen' : 'Registreren';
            document.getElementById('authSubtitle').innerText = isLogin ? 'Log in op je Enterprise Dashboard' : 'Maak een gratis account aan';
            document.getElementById('toggleLink').innerText = isLogin ? 'Registreer hier' : 'Log hier in';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const authBtn = document.getElementById('authBtn');
            if(!email || !password) return alert("Vul alles in.");
            
            authBtn.innerText = "Bezig...";
            authBtn.disabled = true;

            try {
                const res = await fetch(API_URL + (isLogin ? '/login' : '/register'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if(data.token) {
                    localStorage.setItem('kavrix_token', data.token);
                    localStorage.setItem('kavrix_user_id', data.userId);
                    location.reload();
                } else if(data.message) {
                    alert(data.message);
                    if(!isLogin) toggleAuthMode();
                } else { alert(data.error); }
            } catch (e) { alert("Server Fout"); }
            finally { authBtn.disabled = false; authBtn.innerText = isLogin ? 'Inloggen' : 'Registreren'; }
        }

        function logout() { localStorage.clear(); location.reload(); }

        async function loadProjects() {
            const res = await fetch(`${API_URL}/projects/${userId}`);
            const projects = await res.json();
            const list = document.getElementById('projectList');
            list.innerHTML = '';
            projects.forEach(p => {
                const div = document.createElement('div');
                div.className = "nav-item group justify-between";
                div.innerHTML = `<div class="flex items-center gap-3 truncate" onclick="openProject('${p._id}')"><i data-lucide="file-code" class="w-4 h-4"></i><span class="truncate">${p.name}</span></div><i data-lucide="trash-2" onclick="deleteProject('${p._id}')" class="w-4 h-4 opacity-0 group-hover:opacity-100 hover:text-red-500 transition"></i>`;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        async function generateApp() {
            const prompt = document.getElementById('promptInput').value;
            if(!prompt) return;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const res = await fetch(`${API_URL}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, userId, token, projectId: currentProjectId })
            });
            const data = await res.json();
            currentProjectId = data.projectId;
            if(pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(checkStatus, 3000);
        }

        async function checkStatus() {
            const res = await fetch(`${API_URL}/project/${currentProjectId}`);
            const data = await res.json();
            if(data.files && data.files.html !== "GENERATING") {
                clearInterval(pollInterval);
                renderApp(data.files);
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('promptInput').value = "";
                loadProjects();
            }
        }

        function renderApp(files) {
            document.getElementById('previewFrame').srcdoc = `<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"><\/script><style>${files.css}</style></head><body>${files.html}<script>${files.js}<\/script></body></html>`;
        }

        async function openProject(id) {
            const res = await fetch(`${API_URL}/project/${id}`);
            const data = await res.json();
            renderApp(data.files);
            document.getElementById('currentProjectName').innerText = data.name;
            currentProjectId = id;
        }

        async function deleteProject(id) {
            if(confirm("Project verwijderen?")) {
                await fetch(`${API_URL}/project/${id}`, { method: 'DELETE' });
                loadProjects();
            }
        }

        function newProject() {
            currentProjectId = null;
            document.getElementById('previewFrame').srcdoc = "<body></body>";
            document.getElementById('currentProjectName').innerText = "Nieuw Project";
        }
    </script>
</body>
</html>
